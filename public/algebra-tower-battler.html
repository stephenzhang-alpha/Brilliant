<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Algebra Tower</title>
<style>
  :root {
    --violet:#7c3aed; --violet-d:#6d28d9; --pink:#ec4899; --cyan:#06b6d4;
    --amber:#f59e0b; --green:#22c55e; --red:#ef4444; --ink:#2a2350; --muted:#6f6691;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:"Fredoka","Inter",system-ui,sans-serif; color:#fff; overflow:hidden;
    background:linear-gradient(180deg,#312e81 0%,#6d28d9 52%,#a21caf 100%);
  }
  #app { position:relative; height:100%; width:100%; display:flex; flex-direction:column; }

  /* HUD */
  .hud { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; z-index:5; }
  .hud .floor { font-weight:700; opacity:.9; font-size:15px; letter-spacing:.04em; }
  .power-chip {
    display:flex; align-items:center; gap:8px; background:rgba(0,0,0,.28);
    border:2px solid rgba(255,255,255,.28); border-radius:999px; padding:5px 16px; font-size:16px; font-weight:600;
  }
  .power-chip b { font-size:26px; color:#fde68a; min-width:24px; text-align:center; }

  /* 3D tower */
  .scene { flex:1; position:relative; perspective:1100px; overflow:hidden; }
  .tower {
    position:absolute; left:50%; bottom:26px; transform:translateX(-50%) rotateX(28deg);
    transform-style:preserve-3d; display:flex; flex-direction:column-reverse; align-items:center; gap:12px;
  }
  .floor3d {
    width:230px; height:50px; border-radius:14px; position:relative;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; color:#fff;
    border:2px solid rgba(255,255,255,.3);
    background:linear-gradient(180deg,#a78bfa,#7c3aed); box-shadow:0 13px 0 #4c1d95, 0 26px 26px rgba(0,0,0,.4);
  }
  .floor3d.current { background:linear-gradient(180deg,#fcd34d,#f59e0b); box-shadow:0 13px 0 #b45309, 0 26px 26px rgba(0,0,0,.4); color:#3b2a00; }
  .floor3d.enemy { background:linear-gradient(180deg,#fb7185,#e11d48); box-shadow:0 13px 0 #9f1239, 0 26px 26px rgba(0,0,0,.4); }
  .floor3d.boss { width:268px; height:64px; background:linear-gradient(180deg,#f43f5e,#b91c1c); box-shadow:0 16px 0 #7f1d1d, 0 28px 30px rgba(0,0,0,.5); font-size:26px; }
  .floor3d .tag { position:absolute; top:-30px; right:-8px; background:#fff; color:var(--ink); font-size:13px; padding:2px 8px; border-radius:999px; box-shadow:0 3px 8px rgba(0,0,0,.3); }
  .hero { position:absolute; top:-46px; left:50%; transform:translateX(-50%); font-size:38px; filter:drop-shadow(0 8px 5px rgba(0,0,0,.45)); }
  @keyframes hop { 0%{transform:translateX(-50%) translateY(0)} 40%{transform:translateX(-50%) translateY(-22px)} 100%{transform:translateX(-50%) translateY(0)} }
  .hero.hop { animation:hop .45s ease; }

  /* problem panel */
  .panel { position:relative; z-index:6; background:#fff; color:var(--ink); border-radius:26px 26px 0 0; padding:16px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow:0 -10px 40px rgba(0,0,0,.4); }
  .concept { text-align:center; font-size:12.5px; color:var(--muted); margin-bottom:4px; }
  .prompt { text-align:center; font-size:15px; line-height:1.35; }
  .prompt b { color:var(--violet); }
  .expr { text-align:center; font-size:38px; font-weight:700; margin:8px 0 14px; letter-spacing:.02em; }
  .expr .q { color:var(--violet); }
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choices.two { grid-template-columns:1fr 1fr; }
  .choices button {
    font-family:inherit; font-size:24px; font-weight:700; padding:15px; border-radius:16px; border:none;
    background:#f1ecfe; color:var(--ink); cursor:pointer; box-shadow:0 4px 0 #cabdf2; transition:transform .07s, box-shadow .07s;
  }
  .choices button:active { transform:translateY(3px); box-shadow:0 1px 0 #cabdf2; }
  .choices button.right { background:var(--green); color:#fff; box-shadow:0 4px 0 #15803d; }
  .choices button.wrong { background:var(--red); color:#fff; box-shadow:0 4px 0 #991b1b; animation:shake .32s; }
  .choices button.reveal { outline:3px dashed var(--green); outline-offset:2px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .feedback { text-align:center; min-height:20px; margin-top:11px; font-weight:600; font-size:14px; }
  .feedback.good { color:var(--green); } .feedback.bad { color:var(--red); }

  /* overlay */
  .overlay { position:absolute; inset:0; z-index:10; display:none; align-items:center; justify-content:center; background:rgba(20,12,50,.72); padding:20px; }
  .overlay.show { display:flex; }
  .card { background:#fff; color:var(--ink); border-radius:26px; padding:28px; text-align:center; max-width:330px; }
  .card h2 { font-size:25px; margin-top:6px; }
  .card p { color:var(--muted); margin-top:6px; font-size:14px; }
  .card .big { font-size:54px; color:var(--violet); font-weight:700; line-height:1; margin:8px 0; }
  .card button { margin-top:14px; font-family:inherit; font-size:18px; font-weight:700; padding:12px 26px; border:none; border-radius:14px; background:var(--violet); color:#fff; cursor:pointer; box-shadow:0 4px 0 var(--violet-d); }
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="floor" id="floorLabel">Floor 1</div>
    <div class="power-chip">⚡ power <b id="powerVal">x</b></div>
  </div>
  <div class="scene"><div class="tower" id="tower"></div></div>
  <div class="panel" id="panel"></div>
  <div class="overlay" id="overlay">
    <div class="card">
      <div style="font-size:52px">🏆</div>
      <h2>Tower Conquered!</h2>
      <p>Your hero reached the top with power</p>
      <div class="big" id="winPower">0</div>
      <p>This power is banked into your total score.</p>
      <button id="againBtn">Climb again</button>
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";
  var NUM = 9; // floors including the boss at the top
  var S = null;

  function rint(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
  function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
  function postParent(msg) { try { parent.postMessage(msg, "*"); } catch (e) {} }

  var tower = document.getElementById("tower");
  var panel = document.getElementById("panel");
  var overlay = document.getElementById("overlay");
  var powerVal = document.getElementById("powerVal");
  var floorLabel = document.getElementById("floorLabel");

  function buildFloors() {
    var f = [{ kind: "assign" }];
    for (var i = 1; i < NUM - 1; i++) {
      if (i >= 2 && Math.random() < 0.34) { f.push({ kind: "enemy" }); continue; }
      if (i >= 4 && Math.random() < 0.45) f.push({ kind: "op", op: "two", a: rint(2, 3), b: rint(3, 12) });
      else if (Math.random() < 0.5) f.push({ kind: "op", op: "mul", a: rint(2, 3) });
      else f.push({ kind: "op", op: "add", b: rint(6, 18) });
    }
    f.push({ kind: "boss" });
    return f;
  }

  function floorTag(fl) {
    if (fl.kind === "assign") return "x = ?";
    if (fl.kind === "enemy") return "monster";
    if (fl.kind === "boss") return "BOSS";
    if (fl.op === "mul") return "× " + fl.a;
    if (fl.op === "add") return "+ " + fl.b;
    return "×" + fl.a + " +" + fl.b;
  }
  function floorFace(fl) {
    if (fl.kind === "assign") return "🚪";
    if (fl.kind === "enemy") return "👾";
    if (fl.kind === "boss") return "🐉";
    if (fl.op === "mul") return "× " + fl.a;
    if (fl.op === "add") return "+ " + fl.b;
    return "×" + fl.a + "+" + fl.b;
  }

  function distract(ans) {
    var set = [ans];
    var deltas = [-2, -1, 1, 2, 3, -3, Math.round(ans * 0.5) || 1, -(Math.round(ans * 0.3) || 1), ans + 1];
    var guard = 0;
    while (set.length < 4 && guard++ < 40) {
      var d = ans + pick(deltas);
      if (d >= 0 && set.indexOf(d) === -1) set.push(d);
    }
    while (set.length < 4) set.push(ans + set.length); // safety
    return set.sort(function () { return Math.random() - 0.5; });
  }

  // Build the problem for the current floor, using the hero's CURRENT power so
  // the player is always solving for their own next score.
  function genProblem() {
    var fl = S.floors[S.floor];
    var P = S.power;
    if (fl.kind === "assign") {
      var a = rint(4, 7), b = a + rint(2, 4);
      return { kind: "assign", choices: Math.random() < 0.5 ? [a, b] : [b, a] };
    }
    if (fl.kind === "op") {
      var res, expr, desc;
      if (fl.op === "mul") { res = P * fl.a; expr = P + " × " + fl.a; desc = "multiplies your power by " + fl.a; }
      else if (fl.op === "add") { res = P + fl.b; expr = P + " + " + fl.b; desc = "adds " + fl.b + " to your power"; }
      else { res = P * fl.a + fl.b; expr = P + " × " + fl.a + " + " + fl.b; desc = "multiplies by " + fl.a + ", then adds " + fl.b; }
      return { kind: "op", op: fl.op, expr: expr, answer: res, choices: distract(res), desc: desc };
    }
    if (fl.kind === "enemy") {
      var E = Math.min(P - 1, Math.max(2, rint(3, Math.max(3, Math.floor(P * 0.55)))));
      var r = P - E;
      return { kind: "enemy", E: E, expr: P + " − " + E, answer: r, choices: distract(r) };
    }
    // boss
    var B = Math.min(P - 1, Math.max(3, rint(Math.max(2, Math.floor(P * 0.35)), Math.max(3, Math.floor(P * 0.7)))));
    var rb = P - B;
    return { kind: "boss", B: B, expr: P + " − " + B, answer: rb, choices: distract(rb) };
  }

  function renderHUD() {
    powerVal.textContent = S.power == null ? "x" : S.power;
    var top = S.floor >= NUM - 1;
    floorLabel.textContent = top ? "Top Floor · BOSS" : "Floor " + (S.floor + 1) + " / " + NUM;
  }

  function renderTower() {
    tower.innerHTML = "";
    var end = Math.min(NUM - 1, S.floor + 4);
    for (var i = S.floor; i <= end; i++) {
      var fl = S.floors[i];
      var el = document.createElement("div");
      el.className = "floor3d" + (i === S.floor ? " current" : "") + (fl.kind === "enemy" ? " enemy" : "") + (fl.kind === "boss" ? " boss" : "");
      el.textContent = floorFace(fl);
      var tag = document.createElement("div");
      tag.className = "tag";
      tag.textContent = "F" + (i + 1) + " · " + floorTag(fl);
      el.appendChild(tag);
      if (i === S.floor) {
        var hero = document.createElement("div");
        hero.className = "hero hop";
        hero.textContent = "🦸";
        el.appendChild(hero);
      }
      tower.appendChild(el);
    }
  }

  function btnRow(choices, two) {
    var wrap = document.createElement("div");
    wrap.className = "choices" + (two ? " two" : "");
    choices.forEach(function (c) {
      var b = document.createElement("button");
      b.textContent = c;
      b.onclick = function () { onAnswer(c, b); };
      wrap.appendChild(b);
    });
    return wrap;
  }

  function renderPanel() {
    panel.innerHTML = "";
    var p = S.problem;
    var concept = document.createElement("div"); concept.className = "concept";
    var prompt = document.createElement("div"); prompt.className = "prompt";

    if (p.kind === "assign") {
      concept.textContent = "VARIABLES";
      prompt.innerHTML = "Your hero starts as the variable <b>x</b> — a placeholder for a value. Pick what <b>x</b> equals to set your starting power:";
      panel.appendChild(concept); panel.appendChild(prompt);
      var aw = document.createElement("div"); aw.className = "choices two";
      p.choices.forEach(function (c) {
        var b = document.createElement("button");
        b.innerHTML = "x = " + c;
        b.onclick = function () { onAnswer(c, b); };
        aw.appendChild(b);
      });
      panel.appendChild(aw);
    } else {
      if (p.kind === "op") { concept.textContent = p.op === "two" ? "EXPRESSIONS · ORDER OF OPERATIONS" : "EXPRESSIONS"; prompt.innerHTML = "Your power is <b>" + S.power + "</b>. This gate " + p.desc + ". What's your new power?"; }
      else if (p.kind === "enemy") { concept.textContent = "EQUATIONS"; prompt.innerHTML = "A monster of power <b>" + p.E + "</b> strikes! You take <b>" + p.E + "</b> damage. Solve for your power now:"; }
      else { concept.textContent = "THE BOSS"; prompt.innerHTML = "🐉 The Boss hits for <b>" + p.B + "</b>! Land the final blow — what power survives to the top?"; }
      var expr = document.createElement("div"); expr.className = "expr";
      expr.innerHTML = p.expr + " = <span class=\"q\">?</span>";
      panel.appendChild(concept); panel.appendChild(prompt); panel.appendChild(expr);
      panel.appendChild(btnRow(p.choices, false));
    }
    var fb = document.createElement("div"); fb.className = "feedback"; fb.id = "feedback";
    panel.appendChild(fb);
  }

  function setFeedback(txt, good) {
    var fb = document.getElementById("feedback");
    if (fb) { fb.textContent = txt; fb.className = "feedback " + (good ? "good" : "bad"); }
  }

  function onAnswer(val, btn) {
    if (S.locked) return;
    var p = S.problem;

    if (p.kind === "assign") {
      S.locked = true;
      S.power = val;
      btn.classList.add("right");
      setFeedback("x is now " + val + " — let's climb!", true);
      renderHUD();
      setTimeout(advance, 650);
      return;
    }

    if (val === p.answer) {
      S.locked = true;
      btn.classList.add("right");
      S.power = p.answer;
      var msg = "✓ " + p.expr + " = " + p.answer;
      if (p.kind === "enemy") msg += " — monster defeated!";
      if (p.kind === "boss") msg += " — you win!";
      setFeedback(msg, true);
      renderHUD();
      setTimeout(function () { if (p.kind === "boss") win(); else advance(); }, 850);
    } else {
      btn.classList.add("wrong");
      btn.disabled = true;
      S.tries++;
      var hint = "Not quite — try again.";
      if (p.kind === "op" && p.op === "mul") hint = "× means repeated addition. Count it up!";
      else if (p.kind === "op" && p.op === "two") hint = "Order of operations: multiply first, then add.";
      else if (p.kind === "op" && p.op === "add") hint = "Just add it on to your power.";
      else hint = "Subtract the damage from your power.";
      setFeedback(hint, false);
      if (S.tries >= 2) {
        // reveal the correct answer (still must tap it to do the work)
        var btns = panel.querySelectorAll(".choices button");
        btns.forEach(function (b) { if (Number(b.textContent) === p.answer) b.classList.add("reveal"); });
      }
    }
  }

  function advance() {
    S.floor++;
    S.tries = 0;
    S.locked = false;
    S.problem = genProblem();
    renderHUD(); renderTower(); renderPanel();
  }

  function win() {
    document.getElementById("winPower").textContent = S.power;
    overlay.classList.add("show");
    postParent({ type: "atb:victory", power: S.power });
  }

  function init() {
    S = { power: null, floor: 0, floors: buildFloors(), tries: 0, locked: false, problem: null };
    S.problem = genProblem();
    overlay.classList.remove("show");
    postParent({ type: "atb:reset" });
    renderHUD(); renderTower(); renderPanel();
  }

  document.getElementById("againBtn").onclick = init;
  init();
})();
</script>
</body>
</html>
