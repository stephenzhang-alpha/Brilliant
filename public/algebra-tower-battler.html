<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Algebra Quest · Pull the Pins</title>
<style>
  :root {
    --violet:#7c3aed; --violet-d:#6d28d9; --violet-l:#a78bfa; --pink:#ec4899; --cyan:#06b6d4;
    --amber:#f59e0b; --green:#22c55e; --green-d:#15803d; --red:#ef4444; --ink:#241a44; --muted:#6f6691;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; width:100%; }
  body {
    font-family:"Fredoka","Baloo 2",system-ui,sans-serif; color:#fff; overflow:hidden; user-select:none;
    -webkit-user-select:none; background:linear-gradient(180deg,#312e81 0%,#6d28d9 52%,#a21caf 100%);
  }
  #app { position:relative; height:100%; width:100%; display:flex; flex-direction:column; overflow:hidden; }

  /* ---------- HUD ---------- */
  .hud {
    position:relative; z-index:7; display:flex; align-items:center;
    gap:clamp(5px,1.6vw,10px); padding:clamp(6px,1.7vw,11px) clamp(9px,2.6vw,15px); flex:0 0 auto;
  }
  .lvl { display:flex; flex-direction:column; gap:3px; min-width:0; flex:0 1 auto; }
  .lvl .lvlText { font-weight:700; font-size:clamp(13px,3.4vw,16px); letter-spacing:.01em; white-space:nowrap; }
  .pips { display:flex; gap:5px; }
  .pips i { width:clamp(7px,2vw,9px); height:clamp(7px,2vw,9px); border-radius:99px; background:rgba(255,255,255,.28); transition:.25s; }
  .pips i.on { background:#fde68a; box-shadow:0 0 8px #fde68a; transform:scale(1.15); }
  .pips i.done { background:var(--green); box-shadow:0 0 7px rgba(34,197,94,.65); }
  .spacer { flex:1 1 auto; }
  .stats { display:flex; align-items:center; gap:clamp(5px,1.6vw,9px); flex:0 0 auto; }
  .chip {
    display:flex; align-items:center; gap:clamp(3px,1vw,6px); background:rgba(0,0,0,.28);
    border:2px solid rgba(255,255,255,.2); border-radius:999px; padding:clamp(3px,1vw,6px) clamp(8px,2.2vw,13px);
    font-size:clamp(12px,3vw,15px); font-weight:600; white-space:nowrap; line-height:1;
  }
  .chip b { font-size:clamp(14px,3.6vw,19px); min-width:12px; text-align:center; display:inline-block; }
  .chip.scorechip b { color:#fde68a; }
  .chip.retrychip { color:#ede9fe; }
  .chip.retrychip b { color:#fbcfe8; }
  .chip.lvlchip { background:linear-gradient(180deg,#34d399,#059669); border-color:rgba(255,255,255,.4); color:#fff; }
  .chip.lvlchip.zero { opacity:.5; }
  .chip.scorechip.bump b { animation:numPop .55s cubic-bezier(.3,1.5,.5,1); }
  @keyframes numPop { 0%{transform:scale(1)} 32%{transform:scale(1.6); color:#fff; text-shadow:0 0 16px #fff} 100%{transform:scale(1)} }
  .mute {
    flex:0 0 auto; width:clamp(30px,8vw,38px); height:clamp(30px,8vw,38px); border-radius:12px;
    border:2px solid rgba(255,255,255,.2); background:rgba(0,0,0,.28); color:#fff;
    font-size:clamp(14px,4vw,18px); cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .mute:active { transform:translateY(1px); }
  /* ultra-narrow: drop the non-essential level-tally chip so Level/score/retries always fit */
  @media (max-width:340px) { .chip.lvlchip { display:none; } }

  /* ---------- scene ---------- */
  .scene { position:relative; flex:1 1 auto; min-height:0; overflow:hidden; }
  #cv { position:absolute; inset:0; display:block; touch-action:manipulation; }

  /* ---------- legend (sturdy flex sub-header, never overlaps the canvas) ---------- */
  .legend {
    position:relative; z-index:6; flex:0 0 auto; display:flex; flex-wrap:wrap; justify-content:center;
    align-items:center; gap:clamp(5px,1.6vw,9px); padding:0 clamp(9px,2.6vw,15px) clamp(6px,1.5vw,9px);
  }
  .legend .key {
    display:inline-flex; align-items:center; gap:5px; background:rgba(20,12,50,.34);
    border:1px solid rgba(255,255,255,.16); border-radius:999px;
    padding:clamp(3px,1vw,5px) clamp(8px,2vw,11px); font-size:clamp(10.5px,2.8vw,12.5px); font-weight:600; white-space:nowrap;
  }
  .legend .key b { font-weight:800; }
  .legend .key .g { color:#bbf7d0; }
  .legend .key .r { color:#fecaca; }

  /* ---------- banner ---------- */
  .banner {
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%) scale(.6);
    z-index:8; pointer-events:none; text-align:center; opacity:0; width:min(92%,440px);
  }
  .banner.show { animation:bannerPop 1.7s cubic-bezier(.3,1.4,.5,1) forwards; }
  .banner.hold.show { animation:bannerHold 2.2s ease forwards; }
  @keyframes bannerPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 18%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} 78%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-58%) scale(1)} }
  @keyframes bannerHold { 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 14%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} 86%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-58%) scale(1)} }
  .banner .big { font-size:clamp(28px,8.5vw,44px); font-weight:700; text-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 22px rgba(253,224,138,.55); }
  .banner .sub { margin:7px auto 0; font-size:clamp(13px,3.7vw,15.5px); font-weight:600; max-width:340px; line-height:1.36; opacity:.97; }
  .banner.good .big { color:#fde68a; }
  .banner.bad .big { color:#fecaca; }

  /* ---------- question sheet ---------- */
  .sheet {
    position:absolute; left:0; right:0; bottom:0; z-index:9; max-width:560px; margin:0 auto;
    background:#fff; color:var(--ink); border-radius:26px 26px 0 0;
    padding:clamp(10px,2.4vw,15px) clamp(14px,4.5vw,24px) calc(clamp(14px,3vw,20px) + env(safe-area-inset-bottom));
    box-shadow:0 -14px 46px rgba(0,0,0,.45);
    transform:translateY(115%); transition:transform .32s cubic-bezier(.3,1.1,.5,1);
    pointer-events:none; max-height:84%; overflow:auto;
  }
  .sheet.show { transform:translateY(0); pointer-events:auto; }
  .handle { width:46px; height:5px; border-radius:99px; background:#e6e1f6; margin:0 auto clamp(8px,2vw,12px); }
  .ctx {
    text-align:center; font-size:clamp(12.5px,3.4vw,14px); font-weight:600; line-height:1.36;
    border-radius:14px; padding:clamp(8px,2vw,11px) clamp(10px,3vw,14px); margin-bottom:clamp(8px,2vw,12px); border:2px solid;
  }
  .ctx b { font-weight:800; }
  .ctx.green { background:#e9fbef; color:#15803d; border-color:#86efac; }
  .ctx.red { background:#fff0f0; color:#b91c1c; border-color:#fca5a5; animation:ctxBuzz .5s ease; }
  .ctx.amber { background:#fff8ec; color:#b45309; border-color:#fcd34d; }
  .ctx.cyan { background:#ecfdff; color:#0e7490; border-color:#a5f3fc; }
  @keyframes ctxBuzz { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .concept { text-align:center; font-size:clamp(10.5px,2.8vw,12px); font-weight:700; letter-spacing:.07em; color:var(--violet); text-transform:uppercase; opacity:.85; }
  .prompt { text-align:center; font-size:clamp(16px,4.4vw,19px); line-height:1.36; margin-top:4px; }
  .prompt b { color:var(--violet); font-weight:800; }
  .prompt .ex { display:inline-block; font-size:clamp(20px,6vw,27px); font-weight:800; color:var(--violet); letter-spacing:.01em; }
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:clamp(8px,2.2vw,11px); margin-top:clamp(11px,2.6vw,15px); }
  .choices.one { grid-template-columns:1fr; }
  .choices button {
    font-family:inherit; font-size:clamp(18px,5vw,22px); font-weight:700; min-height:clamp(50px,13vw,60px);
    padding:clamp(10px,2.4vw,14px) 10px; border-radius:16px; border:none;
    touch-action:manipulation; background:#f1ecfe; color:var(--ink); cursor:pointer;
    box-shadow:0 4px 0 #cabdf2; transition:transform .07s, box-shadow .07s, background .15s; line-height:1.15;
  }
  .choices.one button { font-size:clamp(15px,4vw,17px); min-height:clamp(46px,12vw,56px); }
  .choices button:active { transform:translateY(3px); box-shadow:0 1px 0 #cabdf2; }
  .choices button.right { background:var(--green); color:#fff; box-shadow:0 4px 0 var(--green-d); animation:rightPulse .45s ease; }
  @keyframes rightPulse { 0%{transform:scale(1)} 40%{transform:scale(1.07)} 100%{transform:scale(1)} }
  .choices button.wrong { background:var(--red); color:#fff; box-shadow:0 4px 0 #991b1b; animation:shake .34s; }
  .choices button.reveal { outline:3px dashed var(--green); outline-offset:2px; animation:revealGlow 1s ease infinite; }
  @keyframes revealGlow { 0%,100%{outline-color:var(--green)} 50%{outline-color:#86efac} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .feedback { text-align:center; min-height:18px; margin-top:clamp(8px,2vw,11px); font-weight:600; font-size:clamp(12.5px,3.4vw,14px); line-height:1.36; }
  .feedback.good { color:var(--green-d); } .feedback.bad { color:var(--red); }
  .feedback.solve { color:var(--ink); }
  .feedback .lead { display:block; }
  .feedback.solve .lead { color:var(--violet); font-weight:800; }
  .feedback .steps { list-style:none; max-width:330px; margin:9px auto 2px; display:flex; flex-direction:column; gap:6px; text-align:left; }
  .feedback .steps li { display:flex; align-items:flex-start; gap:9px; background:#f5f2fe; border:1.5px solid #e6deff; border-radius:13px; padding:8px 11px; color:var(--ink); font-weight:600; font-size:clamp(12.5px,3.3vw,14px); line-height:1.36; animation:stepIn .32s ease both; }
  .feedback .steps li:nth-child(2){ animation-delay:.07s; } .feedback .steps li:nth-child(3){ animation-delay:.14s; } .feedback .steps li:nth-child(4){ animation-delay:.21s; }
  @keyframes stepIn { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
  .feedback .steps li .n { flex:0 0 auto; width:20px; height:20px; border-radius:50%; background:var(--violet); color:#fff; font-size:11.5px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .feedback .steps li .t { flex:1 1 auto; }
  .feedback .steps li b { color:var(--violet); font-weight:800; }
  .feedback .steps li.final { background:#e9fbef; border-color:#a7f3c0; }
  .feedback .steps li.final .n { background:var(--green-d); }
  .feedback .steps li.final b { color:var(--green-d); }
  .feedback .tapline { display:block; margin-top:8px; color:var(--green-d); font-weight:800; }
  .cancel {
    display:block; margin:11px auto 0; font-family:inherit; font-size:13px; font-weight:700;
    color:var(--muted); background:none; border:none; cursor:pointer; padding:6px 10px;
  }
  .cancel:active { transform:translateY(1px); }

  /* ---------- win overlay ---------- */
  .overlay { position:absolute; inset:0; z-index:12; display:none; align-items:center; justify-content:center; background:rgba(20,12,50,.74); padding:20px; }
  .overlay.show { display:flex; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .card { background:#fff; color:var(--ink); border-radius:26px; padding:clamp(20px,5vw,28px) clamp(22px,5.5vw,30px); text-align:center; max-width:min(92%,360px); max-height:92%; overflow:auto; animation:cardIn .45s cubic-bezier(.3,1.5,.5,1); }
  @keyframes cardIn { 0%{transform:scale(.7); opacity:0} 100%{transform:scale(1); opacity:1} }
  .card .trophy { font-size:58px; line-height:1; animation:trophyBounce 1.4s ease-in-out infinite; }
  @keyframes trophyBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-10px) rotate(5deg)} }
  .card h2 { font-size:clamp(22px,6vw,26px); margin-top:6px; color:var(--violet); }
  .card p { color:var(--muted); margin-top:6px; font-size:14px; line-height:1.4; }
  .card .big { font-size:clamp(48px,15vw,64px); color:var(--violet); font-weight:700; line-height:1; margin:8px 0 2px; }
  .card .big span { font-size:clamp(20px,6vw,24px); color:var(--amber); }
  .card button { margin-top:18px; font-family:inherit; font-size:18px; font-weight:700; padding:13px 30px; border:none; border-radius:15px; background:var(--violet); color:#fff; cursor:pointer; box-shadow:0 5px 0 var(--violet-d); }
  .card button:active { transform:translateY(4px); box-shadow:0 1px 0 var(--violet-d); }
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="lvl">
      <span class="lvlText" id="lvlText">Level 1 / 3</span>
      <span class="pips" id="pips"></span>
    </div>
    <div class="spacer"></div>
    <div class="stats">
      <div class="chip retrychip" id="retryChip" title="Level retries">🔁 <b id="retryVal">0</b></div>
      <div class="chip lvlchip zero" id="lvlChip">💎 +0</div>
      <div class="chip scorechip" id="scoreChip">⭐ <b id="scoreVal">0</b></div>
      <button class="mute" id="muteBtn" title="Sound">🔊</button>
    </div>
  </div>

  <div class="legend" id="help">
    <span class="key"><b class="g">💎</b>&nbsp;→ hero</span>
    <span class="key"><b class="r">🔥 🪨</b>&nbsp;→ drain (1 each)</span>
    <span class="key">pull EVERY pin to clear</span>
  </div>

  <div class="scene" id="scene">
    <canvas id="cv"></canvas>
    <div class="banner" id="banner"></div>

    <div class="sheet" id="sheet">
      <div class="handle"></div>
      <div class="ctx" id="qCtx"></div>
      <div class="concept" id="qConcept">Variables</div>
      <div class="prompt" id="qPrompt"></div>
      <div class="choices" id="qChoices"></div>
      <div class="feedback" id="qFeedback"></div>
      <button class="cancel" id="qCancel">← pick a different pin</button>
    </div>

    <div class="overlay" id="win">
      <div class="card">
        <div class="trophy">🏆</div>
        <h2>Contraption Cleared!</h2>
        <p>You powered up your hero with smart algebra.</p>
        <div class="big"><span>⚡</span><span id="winScore">0</span></div>
        <p>hero power banked into your total score</p>
        <button id="againBtn">Play again</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ============================================================= *
   *  Algebra Quest — "Pull the Pin" puzzle (Game 3)
   *  Single self-contained file. Deterministic, scripted flow.
   *  Host contract:  atb:reset on fresh playthrough,
   *                  atb:victory {power:<number>} after 3 levels.
   * ============================================================= */

  /* Scoring tuned so a full clear is a SOLID contributor on par with the other
     two games (overall = sum of each game's best run; ranks at 250/750/1500/3000).
     Stations: 6 gems, 17 pin-pulls (all gated by a question), 3 level clears.
     Flawless run: 6 gems x40 + 17 first-try x6 + 3 clears x40 = 240+102+120 = 462.
     Even a clear with zero first-try bonuses still banks 240+120 = 360, so a full
     clear always lands ~360-462 (comfortably in the ~300-500 target band). */
  var GEM = 40, FIRST_TRY = 6, CLEAR_BONUS = 40;
  var PAL = { violet:"#7c3aed", violetD:"#6d28d9", violetL:"#a78bfa", pink:"#ec4899",
              cyan:"#06b6d4", amber:"#f59e0b", green:"#22c55e", greenD:"#15803d", red:"#ef4444" };

  /* ---- level layouts (authored top -> bottom; order matters) ----
     Each station: type 'gem' | 'hazard' | 'drain'. A released payload falls down
     the central shaft and is caught by the CLOSEST OPEN, NOT-FULL drain below it,
     otherwise it reaches the hero.  NEW RULES (capacity + pull-all):
       • every drain has capacity 1 — it traps EXACTLY ONE hazard then turns FULL;
         a later hazard skips a full drain and continues down (to the next empty
         drain, or the hero → which just shakes + resets the level, forgiving);
       • a level clears only once EVERY pin has been pulled with no hazard hitting
         the hero, so each level has at least as many drains as hazards and a valid
         pull order (a verified solving order is noted on each level below). */
  var LEVELS = [
    {
      name: "Level 1 / 3",
      intro: "Each drain traps just ONE 🔥. Grab the 💎, open the drain, then drop the 🔥 in — and pull EVERY pin to clear!",
      // 1 gem · 1 hazard · 1 drain  →  solve: 💎, drain, 🔥
      stations: [
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"hazard", emoji:"🔥", side: 1 },
        { type:"drain",              side:-1 }
      ]
    },
    {
      name: "Level 2 / 3",
      intro: "Two fires, two drains — but each drain holds only ONE. Grab both 💎 first, then give each 🔥 its own drain.",
      // 2 gems · 2 hazards · 2 drains  →  solve: 💎, 💎, drain, 🔥, drain, 🪨
      stations: [
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"hazard", emoji:"🔥", side: 1 },
        { type:"drain",              side: 1 },
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"hazard", emoji:"🪨", side: 1 },
        { type:"drain",              side:-1 }
      ]
    },
    {
      name: "Level 3 / 3",
      intro: "Trickiest! A 💎 is lost if a drain below it is open, so grab every 💎 first. Each drain traps just ONE hazard — then pull every pin to win!",
      // 3 gems · 2 hazards · 3 drains (one spare)  →  solve: 💎, 💎, 💎, drain, 🔥, drain, 🪨, drain
      stations: [
        { type:"hazard", emoji:"🔥", side: 1 },
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"drain",              side: 1 },
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"hazard", emoji:"🪨", side: 1 },
        { type:"drain",              side:-1 },
        { type:"gem",    emoji:"💎", side:-1 },
        { type:"drain",              side: 1 }
      ]
    }
  ];

  /* ---------- tiny utils ---------- */
  function rint(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
  function pick(a) { return a[(Math.random() * a.length) | 0]; }
  function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = (Math.random() * (i + 1)) | 0, t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function postParent(m) { try { parent.postMessage(m, "*"); } catch (e) {} }

  /* ---------- DOM refs ---------- */
  var app = document.getElementById("app");
  var scene = document.getElementById("scene");
  var cv = document.getElementById("cv");
  var ctx = cv.getContext("2d");
  var helpEl = document.getElementById("help");
  var bannerEl = document.getElementById("banner");
  var sheet = document.getElementById("sheet");
  var qCtx = document.getElementById("qCtx");
  var qConcept = document.getElementById("qConcept");
  var qPrompt = document.getElementById("qPrompt");
  var qChoices = document.getElementById("qChoices");
  var qFeedback = document.getElementById("qFeedback");
  var qCancel = document.getElementById("qCancel");
  var winEl = document.getElementById("win");
  var winScore = document.getElementById("winScore");
  var againBtn = document.getElementById("againBtn");
  var lvlText = document.getElementById("lvlText");
  var pipsEl = document.getElementById("pips");
  var lvlChip = document.getElementById("lvlChip");
  var scoreChip = document.getElementById("scoreChip");
  var scoreVal = document.getElementById("scoreVal");
  var muteBtn = document.getElementById("muteBtn");
  var retryChip = document.getElementById("retryChip");
  var retryVal = document.getElementById("retryVal");

  /* ---------- audio (tiny synth, no external files) ---------- */
  var AC = null, muted = false;
  function actx() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return AC; }
  function resumeAudio() { var c = actx(); if (c && c.state === "suspended") c.resume(); }
  function tone(freq, dur, type, vol, when) {
    if (muted) return; var c = actx(); if (!c) return;
    var t0 = c.currentTime + (when || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.12, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function sPull()  { tone(660, 0.07, "square", 0.07); tone(330, 0.12, "sawtooth", 0.05, 0.03); }
  function sClink() { tone(1320, 0.12, "triangle", 0.11); tone(1760, 0.16, "triangle", 0.08, 0.05); }
  function sCorrect(){ tone(523, 0.1, "triangle", 0.1); tone(784, 0.16, "triangle", 0.1, 0.08); }
  function sWrong() { tone(196, 0.18, "sawtooth", 0.09); }
  function sDrain() { tone(150, 0.22, "sine", 0.12); tone(110, 0.3, "sine", 0.08, 0.05); }
  function sHit()   { tone(140, 0.3, "sawtooth", 0.13); tone(90, 0.45, "square", 0.1, 0.04); }
  function sWin()   { var n = [523, 659, 784, 1047]; for (var i = 0; i < n.length; i++) tone(n[i], 0.22, "triangle", 0.12, i * 0.12); }

  /* ---------- canvas sizing ---------- */
  var W = 1, H = 1, dpr = 1;
  function fitCanvas() {
    var r = scene.getBoundingClientRect();
    W = Math.max(1, r.width); H = Math.max(1, r.height);
    dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initBg();
  }

  /* ---------- layout (positions derived from canvas size) ---------- */
  var L = {};
  function layout() {
    if (!S || !S.stations) return;
    var n = S.stations.length;
    L.shaftX = W * 0.5;
    L.shaftW = clamp(W * 0.06, 26, 52);
    L.stubLen = clamp(W * 0.075, 22, 72);
    L.boxW = clamp(W * 0.16, 46, 86);
    L.heroH = clamp(H * 0.15, 72, 148);
    L.heroX = W * 0.5;
    L.heroY = H - L.heroH * 0.52;
    L.heroCatchY = L.heroY - L.heroH * 0.30;
    L.topY = clamp(H * 0.08, 28, 92);
    var botY = L.heroY - L.heroH * 0.55 - 10;
    var span = Math.max(1, botY - L.topY);
    // Derive a per-row gap from the available span + station count, then size the
    // chambers to FIT inside that gap. Guarantees no station/hit-zone overlap even
    // with 8 stations on a short frame; chambers stay as large as the gap allows.
    var rowGap = n > 1 ? span / (n - 1) : span;
    L.rowGap = rowGap;
    L.boxH = clamp(Math.min(rowGap * 0.62, H * 0.072), 20, 50);
    L.pipeR = clamp(L.boxH * 0.27, 7, 12);   // outer half-thickness of the feed pipes (stubs)
    L.showChips = rowGap >= (L.boxH + 26);   // only float the text destination chips when rows have clear room
    var hitH = Math.min(rowGap - 2, L.boxH + 22);
    if (hitH < L.boxH) hitH = L.boxH;
    for (var i = 0; i < n; i++) {
      var st = S.stations[i];
      st.y = n > 1 ? L.topY + span * (i / (n - 1)) : L.topY + span * 0.5;
      st.shaftEdgeX = L.shaftX + st.side * (L.shaftW / 2);
      st.boxX = st.shaftEdgeX + st.side * (L.stubLen + L.boxW / 2);
      st.boxR = { x: st.boxX - L.boxW / 2, y: st.y - L.boxH / 2, w: L.boxW, h: L.boxH };
      // the pin/bolt crosses the horizontal feed pipe at its midpoint (perpendicular to flow)
      st.pinX = st.shaftEdgeX + st.side * (L.stubLen * 0.5);
      st.hitR = { x: Math.min(st.boxR.x, st.shaftEdgeX) - 8, y: st.y - hitH / 2,
                  w: Math.abs(st.boxX - st.shaftEdgeX) + L.boxW / 2 + 16, h: hitH };
    }
  }

  /* ---------- animated backdrop ---------- */
  var motes = [], pipes = [];
  function initBg() {
    motes = [];
    var n = clamp(Math.round((W * H) / 17000), 16, 46);
    for (var i = 0; i < n; i++) {
      var depth = 0.3 + Math.random() * 0.9;
      motes.push({ x: Math.random() * W, y: Math.random() * H, r: 5 + depth * 20,
        v: 5 + depth * 13, a: 0.05 + Math.random() * 0.12, ph: Math.random() * 6.28,
        rgb: pick(["124,58,237", "236,72,153", "6,182,212", "245,158,11", "34,197,94"]) });
    }
    pipes = [];
    for (var k = 0; k < 3; k++) pipes.push({ x: (k + 0.5) / 3, w: 0.08 + Math.random() * 0.06, ph: Math.random() * 6.28 });
  }
  function drawBg(dt, now) {
    for (var k = 0; k < pipes.length; k++) {
      var p = pipes[k], px = p.x * W + Math.sin(now / 1800 + p.ph) * 5, pw = p.w * W;
      ctx.fillStyle = "rgba(255,255,255,0.03)";
      rr(px - pw / 2, 0, pw, H, pw * 0.4); ctx.fill();
    }
    for (var i = 0; i < motes.length; i++) {
      var m = motes[i]; m.y += m.v * dt; if (m.y - m.r > H) { m.y = -m.r; m.x = Math.random() * W; }
      var a = m.a * (0.6 + 0.4 * Math.sin(now / 700 + m.ph));
      var g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r);
      g.addColorStop(0, "rgba(" + m.rgb + "," + a + ")"); g.addColorStop(1, "rgba(" + m.rgb + ",0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 6.2832); ctx.fill();
    }
  }

  /* ---------- canvas draw helpers ---------- */
  function rr(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  function emoji(ch, x, y, size) {
    ctx.font = size + "px 'Fredoka','Apple Color Emoji','Segoe UI Emoji',system-ui,sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(ch, x, y);
  }
  function label(txt, x, y, size, color, weight) {
    ctx.font = (weight || "700") + " " + size + "px 'Fredoka',system-ui,sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = color; ctx.fillText(txt, x, y);
  }

  /* ---------- particles & floaters ---------- */
  var parts = [], floats = [], tokens = [];
  function burst(x, y, count, opt) {
    opt = opt || {};
    var colors = opt.colors || ["#7c3aed", "#ec4899", "#06b6d4", "#22c55e", "#f59e0b", "#fde68a"];
    for (var i = 0; i < count; i++) {
      var base = opt.ang != null ? opt.ang : -Math.PI / 2;
      var ang = base + (Math.random() - 0.5) * (opt.spread != null ? opt.spread : 1.4);
      var spd = (opt.speed != null ? opt.speed : 220) * (0.5 + Math.random() * 0.8);
      parts.push({ x: x, y: y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        g: opt.g != null ? opt.g : 520, size: (opt.size || 6) * (0.6 + Math.random() * 0.9),
        color: colors[(Math.random() * colors.length) | 0], rot: Math.random() * 6.28,
        vr: (Math.random() - 0.5) * 12, life: opt.life || 1.1, age: 0,
        shape: opt.shape || (Math.random() < 0.5 ? "rect" : "circ") });
    }
  }
  function drawParts(dt) {
    for (var i = parts.length - 1; i >= 0; i--) {
      var p = parts[i]; p.age += dt;
      if (p.age >= p.life || p.y > H + 40) { parts.splice(i, 1); continue; }
      p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
      var t = p.age / p.life; ctx.globalAlpha = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
      ctx.fillStyle = p.color; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      if (p.shape === "rect") ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.4);
      else if (p.shape === "star") { emoji("✦", 0, 0, p.size * 2.4); }
      else { ctx.beginPath(); ctx.arc(0, 0, p.size / 1.7, 0, 6.2832); ctx.fill(); }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
  function floatText(txt, x, y, color, size) {
    floats.push({ txt: txt, x: x, y: y, color: color || "#fff", size: size || 22, age: 0, life: 1.15 });
  }
  function drawFloats(dt) {
    for (var i = floats.length - 1; i >= 0; i--) {
      var f = floats[i]; f.age += dt; if (f.age >= f.life) { floats.splice(i, 1); continue; }
      var t = f.age / f.life; ctx.globalAlpha = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
      var yy = f.y - t * 56, sc = t < 0.2 ? lerp(0.6, 1.1, t / 0.2) : 1;
      ctx.save(); ctx.translate(f.x, yy); ctx.scale(sc, sc);
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineJoin = "round";
      ctx.font = "800 " + f.size + "px 'Fredoka',system-ui,sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.strokeText(f.txt, 0, 0); ctx.fillStyle = f.color; ctx.fillText(f.txt, 0, 0); ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  /* ---------- contraption drawing ---------- */
  function drawShaft() {
    var top = L.topY - 20, bot = L.heroCatchY + 6;
    var x = L.shaftX - L.shaftW / 2, w = L.shaftW, h = bot - top, r = w / 2;
    // cylindrical body sheen (light runs across the width → reads as a round pipe)
    var g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, "rgba(38,26,74,.62)"); g.addColorStop(0.2, "rgba(126,108,178,.5)");
    g.addColorStop(0.5, "rgba(196,186,228,.42)"); g.addColorStop(0.8, "rgba(118,100,168,.5)");
    g.addColorStop(1, "rgba(38,26,74,.62)");
    ctx.fillStyle = g; rr(x, top, w, h, r); ctx.fill();
    // recessed inner channel so falling payloads read against it
    ctx.fillStyle = "rgba(10,6,30,.32)";
    rr(x + w * 0.2, top + 3, w * 0.6, h - 6, w * 0.3); ctx.fill();
    // rim + glossy highlight stripe
    ctx.strokeStyle = "rgba(255,255,255,.24)"; ctx.lineWidth = 2; rr(x, top, w, h, r); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,.18)";
    rr(x + w * 0.15, top + 5, w * 0.12, h - 10, w * 0.06); ctx.fill();
  }

  // A feed pipe (horizontal tube) carrying a chamber's payload into the shaft.
  function drawStub(st) {
    var x0 = st.shaftEdgeX, x1 = st.boxX - st.side * (L.boxW / 2), y = st.y;
    var lx = Math.min(x0, x1), w = Math.abs(x1 - x0) + 1, pr = L.pipeR, ph = pr * 2, py = y - pr;
    // cylindrical body sheen (light runs across the height → reads as a round tube)
    var g = ctx.createLinearGradient(0, py, 0, py + ph);
    g.addColorStop(0, "rgba(38,26,74,.6)"); g.addColorStop(0.24, "rgba(150,134,196,.6)");
    g.addColorStop(0.5, "rgba(208,199,234,.55)"); g.addColorStop(0.78, "rgba(120,102,170,.6)");
    g.addColorStop(1, "rgba(38,26,74,.6)");
    ctx.fillStyle = g; rr(lx, py, w, ph, pr * 0.7); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.22)"; ctx.lineWidth = 1.5; rr(lx, py, w, ph, pr * 0.7); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,.2)"; rr(lx + 2, py + 2, w - 4, ph * 0.22, ph * 0.1); ctx.fill();
  }

  function drawChamber(st) {
    var r = st.boxR, open = st.pulled;
    // chamber shell
    var g = ctx.createLinearGradient(0, r.y, 0, r.y + r.h);
    g.addColorStop(0, "rgba(255,255,255,.20)"); g.addColorStop(1, "rgba(255,255,255,.07)");
    ctx.fillStyle = g; rr(r.x, r.y, r.w, r.h, 12); ctx.fill();
    ctx.strokeStyle = open ? "rgba(255,255,255,.18)" : "rgba(255,255,255,.4)"; ctx.lineWidth = 2;
    rr(r.x, r.y, r.w, r.h, 12); ctx.stroke();
    if (!open) {
      var bob = Math.sin(now1 / 500 + st.y) * 1.5;
      emoji(st.emoji, st.boxX, st.y + bob, L.boxH * 0.66);
    } else {
      ctx.globalAlpha = 0.5; label("empty", st.boxX, st.y, 11, "#fff"); ctx.globalAlpha = 1;
    }
  }

  function drawDrain(st) {
    var r = st.boxR, full = st.full, open = st.open && !full;
    // pit / chute — a FULL drain reads as a clogged, greyed-out "used" hole
    ctx.fillStyle = full ? "rgba(96,86,112,.5)" : (open ? "rgba(6,182,212,.30)" : "rgba(10,6,30,.4)");
    rr(r.x, r.y, r.w, r.h, 12); ctx.fill();
    ctx.strokeStyle = full ? "rgba(186,176,202,.7)" : (open ? "rgba(103,232,249,.85)" : "rgba(255,255,255,.32)");
    ctx.lineWidth = 2; rr(r.x, r.y, r.w, r.h, 12); ctx.stroke();
    if (full) {
      // the hazard it trapped, dimmed, behind a "no-entry" cap so it clearly can't take more
      ctx.globalAlpha = 0.8; emoji(st.caughtEmoji || "🔥", st.boxX, st.y - r.h * 0.04, L.boxH * 0.44); ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(230,226,240,.9)"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      var cr = L.boxH * 0.32;
      ctx.beginPath(); ctx.arc(st.boxX, st.y, cr, 0, 6.2832); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(st.boxX - cr * 0.72, st.y + cr * 0.72); ctx.lineTo(st.boxX + cr * 0.72, st.y - cr * 0.72); ctx.stroke();
      if (L.showChips) label("FULL", st.boxX, r.y + r.h + 9, 10, "#e6e2f0");
      return;
    }
    // mouth chevrons
    ctx.strokeStyle = open ? PAL.cyan : "rgba(255,255,255,.5)"; ctx.lineWidth = 3; ctx.lineCap = "round";
    for (var k = 0; k < 2; k++) {
      var yy = st.y - 5 + k * 8;
      ctx.beginPath(); ctx.moveTo(st.boxX - 11, yy - 4); ctx.lineTo(st.boxX, yy + 3); ctx.lineTo(st.boxX + 11, yy - 4); ctx.stroke();
    }
    emoji(open ? "🌀" : "🚰", st.boxX, st.y - r.h * 0.02, L.boxH * 0.5);
    if (L.showChips) label(open ? "OPEN" : "DRAIN", st.boxX, r.y + r.h + 9, 10, open ? "#a5f3fc" : "rgba(255,255,255,.72)");
  }

  /* A locking PIN/BOLT, rendered PERPENDICULAR to its feed pipe: the pipe runs
     horizontally, so the bolt crosses it vertically (90°) and is pulled straight
     UP (out along its own axis) to release the payload. Clean chrome look with a
     grab ring on top, a shoulder collar resting on the pipe, and knurled grip. */
  function drawPin(st) {
    if (st.pulled && !st.pulling) return;           // bolt fully extracted — gone
    var pull = st.pulling ? st.pullT : 0;
    var cx = st.pinX, y = st.y, pr = L.pipeR;
    var bw = clamp(pr * 1.1, 8, 13);                // bolt-rod width
    var idle = (!st.pulled && S.phase === "idle");
    var bob = idle ? Math.sin(now1 / 360 + st.y) * 2 : 0;
    var pullDist = clamp(L.rowGap * 0.6, 26, 54);
    var outY = -(pull * pullDist) + bob;            // slides UP, perpendicular to the (horizontal) pipe

    // Bolt geometry. The rod ALWAYS crosses the pipe (rodTop above, rodBot below);
    // the grab ring sits above. Ring size is bounded by the room to the row above
    // AND to the scene top, so heads never clip off-canvas or crowd neighbours.
    var protrudeTop = clamp(bw * 0.7, 5, 11);
    var rodTop = -(pr + protrudeTop), rodBot = pr + 4;
    var roomAbove = Math.min(L.rowGap - 2 * pr - 6, y - (pr + protrudeTop) - 3);
    var ringR = clamp(Math.min(bw * 0.95, roomAbove * 0.5), 4.5, 9);
    var ringCY = rodTop - ringR * 0.92;

    ctx.save();
    ctx.translate(cx, y + outY);
    ctx.globalAlpha = 1 - pull * 0.8;

    // "pull me" affordance: a pulsing glow ring on the handle, plus an up-chevron when there's headroom
    if (idle) {
      var pulse = 0.55 + Math.sin(now1 / 300 + st.y) * 0.3;
      ctx.save();
      ctx.globalAlpha = 0.5 * pulse; ctx.strokeStyle = "#fde68a"; ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.arc(0, ringCY, ringR + 5 + Math.sin(now1 / 300 + st.y) * 1.8, 0, 6.2832); ctx.stroke();
      if (roomAbove > 12) {
        ctx.globalAlpha = 0.7 * pulse; ctx.lineWidth = 2.4; ctx.lineCap = "round";
        var chY = ringCY - ringR - 8;
        ctx.beginPath(); ctx.moveTo(-5, chY + 4); ctx.lineTo(0, chY - 1); ctx.lineTo(5, chY + 4); ctx.stroke();
      }
      ctx.restore();
    }

    // soft shadow cast on the pipe
    ctx.save(); ctx.globalAlpha *= 0.22; ctx.fillStyle = "#000";
    rr(-bw / 2 + 1.5, rodTop + 2, bw, rodBot - rodTop, bw * 0.45); ctx.fill(); ctx.restore();

    // bolt rod — chrome cylinder (vertical sheen band reads as round metal)
    var mg = ctx.createLinearGradient(-bw / 2, 0, bw / 2, 0);
    mg.addColorStop(0, "#69727f"); mg.addColorStop(0.27, "#dde5ef"); mg.addColorStop(0.5, "#ffffff");
    mg.addColorStop(0.64, "#c2ccd9"); mg.addColorStop(1, "#5b636d");
    ctx.fillStyle = mg; rr(-bw / 2, rodTop, bw, rodBot - rodTop, bw * 0.42); ctx.fill();
    ctx.strokeStyle = "rgba(36,26,68,.4)"; ctx.lineWidth = 1; rr(-bw / 2, rodTop, bw, rodBot - rodTop, bw * 0.42); ctx.stroke();

    // shoulder collar resting on the pipe (the part you pull against)
    var colW = bw + 6, colH = bw * 0.58, colY = -(pr + 1);
    var cg = ctx.createLinearGradient(0, colY - colH / 2, 0, colY + colH / 2);
    cg.addColorStop(0, "#eef3f9"); cg.addColorStop(1, "#9aa4b2");
    ctx.fillStyle = cg; rr(-colW / 2, colY - colH / 2, colW, colH, colH * 0.45); ctx.fill();
    ctx.strokeStyle = "rgba(36,26,68,.35)"; ctx.lineWidth = 1; rr(-colW / 2, colY - colH / 2, colW, colH, colH * 0.45); ctx.stroke();

    // knurled grip ticks on the exposed rod just above the pipe
    ctx.strokeStyle = "rgba(74,82,96,.5)"; ctx.lineWidth = 1;
    for (var gI = 0; gI < 2; gI++) { var ky = -(pr) - 2 - gI * 3; ctx.beginPath(); ctx.moveTo(-bw * 0.28, ky); ctx.lineTo(bw * 0.28, ky + 1.3); ctx.stroke(); }

    // bottom tip sheen
    ctx.fillStyle = "rgba(255,255,255,.45)"; ctx.beginPath(); ctx.ellipse(-bw * 0.12, rodBot - 2.2, bw * 0.16, 1.5, 0, 0, 6.28); ctx.fill();

    // grab ring / pull handle on top
    ctx.lineCap = "round";
    ctx.lineWidth = ringR * 0.62; ctx.strokeStyle = "#7e8794";
    ctx.beginPath(); ctx.arc(0, ringCY, ringR, 0, 6.2832); ctx.stroke();
    ctx.lineWidth = ringR * 0.3; ctx.strokeStyle = "#f3f7fb";      // top-left sheen
    ctx.beginPath(); ctx.arc(0, ringCY, ringR, Math.PI * 1.04, Math.PI * 1.72); ctx.stroke();
    ctx.lineWidth = 1; ctx.strokeStyle = "rgba(30,22,52,.35)";     // inner hole edge
    ctx.beginPath(); ctx.arc(0, ringCY, ringR - ringR * 0.31, 0, 6.2832); ctx.stroke();

    ctx.restore();
  }

  /* route preview from a chamber to its current destination */
  function previewPath(st) {
    var dest = destOf(st), pts = buildPath(st, dest);
    var danger = st.type === "hazard" && dest.type === "hero";
    var color, alpha, dash;
    if (st.type === "gem") { color = dest.type === "hero" ? PAL.green : "#94a3b8"; alpha = dest.type === "hero" ? 0.34 : 0.2; dash = [2, 6]; }
    else if (danger) { color = PAL.red; alpha = 0.58 + Math.sin(now1 / 160) * 0.2; dash = [7, 6]; }
    else { color = PAL.green; alpha = 0.32; dash = [2, 7]; } // safe hazard
    ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = danger ? 3.6 : 2.4;
    ctx.setLineDash(dash); ctx.lineDashOffset = -(now1 / (danger ? 22 : 60)) % 1000; ctx.lineJoin = "round"; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    // destination chip near chamber — danger warning always shows; the rest only when rows have room
    if (L.showChips || danger) {
      var chip = previewChip(st, dest);
      drawChip(st.boxX, st.boxR.y - 13, chip.txt, chip.bg, chip.fg, danger);
    }
  }
  function previewChip(st, dest) {
    if (st.type === "gem") return dest.type === "hero"
      ? { txt: "→🦸 +" + GEM, bg: PAL.green, fg: "#fff" }
      : { txt: "→🌀 lost", bg: "#64748b", fg: "#fff" };
    return dest.type === "drain"
      ? { txt: "→🌀 safe", bg: PAL.green, fg: "#fff" }
      : { txt: "→🦸 ⚠", bg: PAL.red, fg: "#fff" };
  }
  function drawChip(x, y, txt, bg, fg, pulse) {
    ctx.font = "700 12px 'Fredoka',system-ui,sans-serif";
    var w = ctx.measureText(txt).width + 18, h = 20;
    var sc = pulse ? 1 + Math.sin(now1 / 180) * 0.06 : 1;
    ctx.save(); ctx.translate(x, y); ctx.scale(sc, sc);
    ctx.fillStyle = "rgba(8,5,24,.28)"; rr(-w / 2, -h / 2 + 1.5, w, h, h / 2); ctx.fill();
    ctx.fillStyle = bg; rr(-w / 2, -h / 2, w, h, h / 2); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.4)"; ctx.lineWidth = 1; rr(-w / 2, -h / 2, w, h, h / 2); ctx.stroke();
    ctx.fillStyle = fg; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, 0, 0.5);
    ctx.restore();
  }

  /* ---------- hero ---------- */
  function drawHero() {
    var hx = L.heroX, hy = L.heroY, R = L.heroH * 0.34;
    var hero = S.hero;
    var jump = hero.jump > 0 ? Math.sin((1 - hero.jump) * Math.PI) * 18 : 0;
    var bob = Math.sin(now1 / 600) * 2.5;
    var cy = hy - jump + bob;
    // cart / basket
    var cw = R * 2.5, ch = R * 1.05, cyb = hy + R * 0.55;
    ctx.fillStyle = "#b45309"; rr(hx - cw / 2, cyb, cw, ch, 12); ctx.fill();
    var gb = ctx.createLinearGradient(0, cyb, 0, cyb + ch);
    gb.addColorStop(0, "#fcd34d"); gb.addColorStop(1, "#f59e0b");
    ctx.fillStyle = gb; rr(hx - cw / 2, cyb - 5, cw, ch, 12); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.45)"; ctx.lineWidth = 2; rr(hx - cw / 2, cyb - 5, cw, ch, 12); ctx.stroke();
    ctx.fillStyle = "#7c2d12"; // wheels

    }
    if (g === 1) { v = rint(2, 9); b = rint(2, 12); ans = v + b;
      return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + " + " + b + "</span>?", choices: numChoices(ans),
        nudge: "replace <b>" + L1 + "</b> with <b>" + v + "</b>, then add " + b + ".",
        steps: ["Replace " + L1 + " with " + v + ": " + v + " + " + b,
                "Add: " + v + " + " + b + " = <b>" + ans + "</b>"] };
    }
    if (g === 2) { v = rint(6, 12); b = rint(2, v - 1); ans = v - b;
      return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + " − " + b + "</span>?", choices: numChoices(ans),
        nudge: "put <b>" + v + "</b> in for " + L1 + ", then subtract " + b + ".",
        steps: ["Replace " + L1 + " with " + v + ": " + v + " − " + b,
                "Subtract: " + v + " − " + b + " = <b>" + ans + "</b>"] };
    }
    if (g === 3) { var d = rint(2, 4), kk = rint(2, 6); v = d * kk; ans = kk;
      return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + " ÷ " + d + "</span>?", choices: numChoices(ans),
        nudge: "put <b>" + v + "</b> in for " + L1 + ", then split it into " + d + " equal groups.",
        steps: ["Replace " + L1 + " with " + v + ": " + v + " ÷ " + d,
                "Divide: " + v + " ÷ " + d + " = <b>" + ans + "</b>"] };
    }
    if (g === 4) { v = rint(2, 9); ans = 2 * v;
      return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + " + " + L1 + "</span>?", choices: numChoices(ans),
        nudge: L1 + " + " + L1 + " is two of the same value, and each is <b>" + v + "</b>.",
        steps: ["Each " + L1 + " is worth " + v + ", so " + v + " + " + v,
                "Add: " + v + " + " + v + " = <b>" + ans + "</b>"] };
    }
    if (g === 6) { v = rint(2, 7); ans = v * v;
      return { concept: "Squares", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + "²</span>?", choices: numChoices(ans),
        nudge: "<b>" + L1 + "²</b> means " + L1 + " × " + L1 + " (not " + L1 + " × 2).",
        steps: [L1 + "² means <b>" + L1 + " × " + L1 + "</b>",
                "Put in " + L1 + " = " + v + ": " + v + " × " + v,
                "Multiply: " + v + " × " + v + " = <b>" + ans + "</b>"] };
    }
    if (g === 7) { c = rint(2, 3); v = rint(2, 6); b = rint(1, 5); ans = c * v + b;
      return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c + L1 + " + " + b + "</span>?", choices: numChoices(ans),
        nudge: "two steps: multiply " + c + " × " + L1 + " first, then add " + b + ".",
        steps: ["Replace " + L1 + " with " + v + ": " + c + " × " + v + " + " + b,
                "Multiply first: " + c + " × " + v + " = " + (c * v),
                "Then add: " + (c * v) + " + " + b + " = <b>" + ans + "</b>"] };
    }
    c = rint(2, 4); v = rint(2, 8); ans = c * v;
    return { concept: "Evaluating expressions", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c + " · " + L1 + "</span>?", choices: numChoices(ans),
      nudge: "the dot means multiply, so " + c + " · " + L1 + " = " + c + " × " + L1 + ".",
      steps: [c + " · " + L1 + " means <b>" + c + " × " + L1 + "</b>",
              "Put in " + L1 + " = " + v + ": " + c + " × " + v,
              "Multiply: " + c + " × " + v + " = <b>" + ans + "</b>"] };
  }

  function qHard() {
    var g = diffGen(2, null, 7), L1 = pick(LETTERS), c, v, b, ans, c1, c2, s;
    if (g === 0) { c = rint(2, 4); v = rint(2, 8); b = rint(2, 9); ans = c * v + b;
      return { concept: "Evaluate (order of ops)", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c + L1 + " + " + b + "</span>?", choices: numChoices(ans),
        nudge: "order of operations: do × before +, so start with " + c + " × " + v + ".",
        steps: ["Replace " + L1 + " with " + v + ": " + c + " × " + v + " + " + b,
                "Multiply first: " + c + " × " + v + " = " + (c * v),
                "Then add: " + (c * v) + " + " + b + " = <b>" + ans + "</b>"] };
    }
    if (g === 1) { c1 = rint(2, 6); c2 = rint(2, 6); s = c1 + c2;
      return { concept: "Combine like terms", prompt: "Combine: <span class='ex'>" + c1 + L1 + " + " + c2 + L1 + "</span> = ?",
        choices: symChoices(s + L1, [(s + 1) + L1, (c1 * c2) + L1, String(s), (s - 1) + L1]),
        nudge: "both terms have the same letter " + L1 + ", so just add the numbers in front.",
        steps: ["Both terms use the same variable " + L1,
                "Add the numbers in front: " + c1 + " + " + c2 + " = " + s,
                "Keep the " + L1 + ": <b>" + s + L1 + "</b>"] };
    }
    if (g === 2) { c = rint(2, 4); v = rint(3, 8); b = rint(2, c * v - 1); ans = c * v - b;
      return { concept: "Evaluate (order of ops)", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c + L1 + " − " + b + "</span>?", choices: numChoices(ans),
        nudge: "multiply " + c + " × " + v + " first, then subtract " + b + ".",
        steps: ["Replace " + L1 + " with " + v + ": " + c + " × " + v + " − " + b,
                "Multiply first: " + c + " × " + v + " = " + (c * v),
                "Then subtract: " + (c * v) + " − " + b + " = <b>" + ans + "</b>"] };
    }
    if (g === 3) { c1 = rint(4, 9); c2 = rint(1, c1 - 1); s = c1 - c2;
      return { concept: "Combine like terms", prompt: "Simplify: <span class='ex'>" + c1 + L1 + " − " + c2 + L1 + "</span> = ?",
        choices: symChoices(s + L1, [(s + 1) + L1, (s - 1 < 0 ? 0 : s - 1) + L1, String(s), (c1 + c2) + L1]),
        nudge: "same letter " + L1 + " on both terms, so subtract the numbers in front.",
        steps: ["Both terms use the same variable " + L1,
                "Subtract the numbers in front: " + c1 + " − " + c2 + " = " + s,
                "Keep the " + L1 + ": <b>" + s + L1 + "</b>"] };
    }
    if (g === 4) { c1 = rint(2, 3); c2 = rint(2, 3); v = rint(2, 6); ans = (c1 + c2) * v;
      return { concept: "Combine, then evaluate", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c1 + L1 + " + " + c2 + L1 + "</span>?", choices: numChoices(ans),
        nudge: "first combine the " + L1 + " terms, then put in <b>" + v + "</b>.",
        steps: ["Combine like terms: " + c1 + L1 + " + " + c2 + L1 + " = " + (c1 + c2) + L1,
                "Put in " + L1 + " = " + v + ": " + (c1 + c2) + " × " + v,
                "Multiply: " + (c1 + c2) + " × " + v + " = <b>" + ans + "</b>"] };
    }
    if (g === 6) { v = rint(4, 9); ans = v * v;
      return { concept: "Squares", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + L1 + "²</span>?", choices: numChoices(ans),
        nudge: "<b>" + L1 + "²</b> means " + L1 + " × " + L1 + ", not " + L1 + " × 2.",
        steps: [L1 + "² means <b>" + L1 + " × " + L1 + "</b>",
                "Put in " + L1 + " = " + v + ": " + v + " × " + v,
                "Multiply: " + v + " × " + v + " = <b>" + ans + "</b>"] };
    }
    c = rint(2, 3); v = rint(2, 6); b = rint(2, 8); ans = c * v + c * b;  // c(v+b) flavour
    return { concept: "Evaluate (order of ops)", prompt: "If <b>" + L1 + " = " + v + "</b>, what is <span class='ex'>" + c + "(" + L1 + " + " + b + ")</span>?", choices: numChoices(ans),
      nudge: "do the inside of the parentheses first: " + v + " + " + b + ".",
      steps: ["Replace " + L1 + " with " + v + ": " + c + " × (" + v + " + " + b + ")",
              "Add inside the parentheses: " + v + " + " + b + " = " + (v + b),
              "Multiply: " + c + " × " + (v + b) + " = <b>" + ans + "</b>"] };
  }

  /* ---------- question sheet UI ---------- */
  function ctxFor(st) {
    if (st.type === "drain") return { html: "🔧 Open this drain 🌀 — it traps <b>just one</b> 🔥/🪨, then it's <b>FULL</b>.", tone: "cyan" };
    var dest = destOf(st);
    if (st.type === "gem") return dest.type === "hero"
      ? { html: "💎 <b>→ 🦸 hero</b> — the gem rolls home for <b>+" + GEM + "</b>!", tone: "green" }
      : { html: "💎 <b>→ 🌀 drain</b> — an open drain below would <b>lose</b> this gem. (You can still pull it.)", tone: "amber" };
    return dest.type === "drain"
      ? { html: st.emoji + " <b>→ 🌀 drain</b> — <b>safe!</b> An empty drain below traps it.", tone: "green" }
      : { html: "⚠️ " + st.emoji + " <b>→ 🦸 hero</b> — <b>DANGER!</b> No empty drain below — open one first or the level resets.", tone: "red" };
  }

  function openQuestion(st) {
    S.selected = st; S.phase = "question";
    var q = makeQuestion(S.level); S.q = q;
    var info = ctxFor(st);
    qCtx.className = "ctx " + info.tone; qCtx.innerHTML = info.html;
    qConcept.textContent = q.concept;
    qPrompt.innerHTML = q.prompt;
    qFeedback.textContent = ""; qFeedback.className = "feedback";
    var longOpt = q.choices.some(function (c) { return c.label.length > 13; });
    qChoices.className = "choices" + (longOpt ? " one" : "");
    qChoices.innerHTML = "";
    q.choices.forEach(function (c) {
      var b = document.createElement("button");
      b.textContent = c.label; b._c = c;
      b.onclick = function () { answer(c, b); };
      qChoices.appendChild(b);
    });
    sheet.classList.add("show");
  }
  function closeSheet() { sheet.classList.remove("show"); }

  /* ---------- miss explanations ----------
     On a miss we coach the player instead of just flashing a hint:
       • 1st miss  -> a warm nudge toward the FIRST step (q.nudge)
       • 2nd miss  -> the full, number-specific worked solution (q.steps)
                      + we reveal/allow the correct answer so nobody is stuck. */
  var MISS_LEADS = ["Not quite —", "So close —", "Almost there —", "Good try —", "Oops —"];
  var REVEAL_LEADS = ["No worries — let's solve it together:", "Here's the step-by-step:",
                      "Let's walk through it:", "Watch how it works:"];
  function explainHTML(q, full) {
    if (!full) return '<span class="lead">' + pick(MISS_LEADS) + " " + q.nudge + "</span>";
    var html = '<span class="lead">' + pick(REVEAL_LEADS) + "</span><ol class=\"steps\">";
    for (var i = 0; i < q.steps.length; i++) {
      var last = i === q.steps.length - 1;
      html += "<li" + (last ? ' class="final"' : "") + '><span class="n">' +
              (last ? "✓" : (i + 1)) + '</span><span class="t">' + q.steps[i] + "</span></li>";
    }
    return html + '</ol><span class="tapline">👉 now tap the glowing answer</span>';
  }

  function answer(c, btn) {
    if (S.phase !== "question" || S.qLock) return;
    var q = S.q;
    if (c.correct) {
      S.qLock = true; btn.classList.add("right"); sCorrect();
      var firstTry = q.tries === 0;
      if (firstTry) { S.levelBonus += FIRST_TRY; setLevelChip(); }
      qFeedback.className = "feedback good";
      qFeedback.textContent = firstTry ? "Nice — first try! Pulling the pin… 🔧 (+" + FIRST_TRY + ")" : "Correct! Pulling the pin… 🔧";
      var st = S.selected;
      setTimeout(function () { S.qLock = false; closeSheet(); beginPull(st, firstTry); }, 520);
    } else {
      btn.classList.add("wrong"); btn.disabled = true; sWrong();
      q.tries++;
      var full = q.tries >= 2;
      qFeedback.className = full ? "feedback solve" : "feedback bad";
      qFeedback.innerHTML = explainHTML(q, full);
      if (full) {
        var btns = qChoices.querySelectorAll("button");
        btns.forEach(function (b) { if (b._c.correct) b.classList.add("reveal"); });
      }
    }
  }

  qCancel.onclick = function () {
    if (S.phase !== "question") return;
    S.qLock = false; closeSheet(); S.phase = "idle"; S.selected = null; S.q = null;
  };

  /* ---------- input ---------- */
  function hitStation(x, y) {
    for (var i = 0; i < S.stations.length; i++) {
      var st = S.stations[i]; if (st.pulled) continue;
      var r = st.hitR; if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return st;
    }
    return null;
  }
  cv.addEventListener("pointerdown", function (e) {
    resumeAudio();
    if (S.phase !== "idle") return;
    var r = cv.getBoundingClientRect();
    var st = hitStation(e.clientX - r.left, e.clientY - r.top);
    if (st) openQuestion(st);
  });

  muteBtn.onclick = function () { muted = !muted; muteBtn.textContent = muted ? "🔇" : "🔊"; if (!muted) resumeAudio(); };
  againBtn.onclick = function () { initGame(); };

  /* ---------- master loop ---------- */
  var now1 = 0, lastNow = 0;
  function frame(now) {
    now1 = now;
    var dt = lastNow ? Math.min(50, now - lastNow) / 1000 : 0; lastNow = now;

    // advance pin pull anim
    if (S) for (var i = 0; i < S.stations.length; i++) {
      var st = S.stations[i];
      if (st.pulling) { st.pullT += dt / 0.26; if (st.pullT >= 1) { st.pullT = 1; onPulled(st); } }
    }
    // hero anim decay
    if (S) { if (S.hero.jump > 0) { S.hero.jump = Math.max(0, S.hero.jump - dt / 0.55); if (S.hero.jump === 0 && S.hero.mood === "cheer" && S.phase !== "clear" && S.phase !== "won") S.hero.mood = "idle"; }
             if (S.shake > 0) S.shake = Math.max(0, S.shake - dt * 34);
             if (S.redFlash > 0) S.redFlash = Math.max(0, S.redFlash - dt / 0.5); }

    ctx.clearRect(0, 0, W, H);
    drawBg(dt, now);

    if (S && S.stations.length) {
      ctx.save();
      if (S.shake > 0) ctx.translate((Math.random() - 0.5) * S.shake, (Math.random() - 0.5) * S.shake);

      drawShaft();
      var k;
      for (k = 0; k < S.stations.length; k++) drawStub(S.stations[k]);
      // route previews for unpulled chambers (skip during question for clarity)
      if (S.phase === "idle" || S.phase === "flow")
        for (k = 0; k < S.stations.length; k++) { var s2 = S.stations[k]; if (!s2.pulled && s2.type !== "drain") previewPath(s2); }
      for (k = 0; k < S.stations.length; k++) {
        var s = S.stations[k];
        if (s.type === "drain") drawDrain(s); else drawChamber(s);
        drawPin(s);
      }
      drawTokens(dt);
      drawHero();
      drawParts(dt);
      drawFloats(dt);
      ctx.restore();

      // dim while answering
      if (S.phase === "question") { ctx.fillStyle = "rgba(15,10,40,.45)"; ctx.fillRect(0, 0, W, H);
        if (S.selected) { var sel = S.selected; ctx.strokeStyle = "#fde68a"; ctx.lineWidth = 3;
          ctx.setLineDash([6, 5]); ctx.lineDashOffset = -(now / 40) % 1000;
          rr(sel.hitR.x, sel.hitR.y, sel.hitR.w, sel.hitR.h, 14); ctx.stroke(); ctx.setLineDash([]); } }
      // red flash on hazard hit
      if (S.redFlash > 0) { ctx.fillStyle = "rgba(239,68,68," + (S.redFlash * 0.42) + ")"; ctx.fillRect(0, 0, W, H); }
    }
    requestAnimationFrame(frame);
  }

  /* ---------- boot ---------- */
  function initGame() {
    S = freshState();
    winEl.classList.remove("show");
    setScore(0, false); setLevelChip(); retryVal.textContent = "0";
    postParent({ type: "atb:reset" });
    startLevel(0, false);
  }

  fitCanvas();
  if (window.ResizeObserver) { var ro = new ResizeObserver(function () { fitCanvas(); layout(); }); ro.observe(scene); }
  else window.addEventListener("resize", function () { fitCanvas(); layout(); });
  requestAnimationFrame(frame);
  initGame();
})();
</script>
</body>
</html>
