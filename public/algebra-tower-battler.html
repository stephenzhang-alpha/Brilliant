<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Algebra Tower</title>
<style>
  :root {
    --violet:#7c3aed; --violet-d:#6d28d9; --violet-l:#a78bfa; --pink:#ec4899; --cyan:#06b6d4;
    --amber:#f59e0b; --green:#22c55e; --green-d:#15803d; --red:#ef4444; --ink:#2a2350; --muted:#6f6691;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:"Fredoka","Inter",system-ui,sans-serif; color:#fff; overflow:hidden; user-select:none;
    -webkit-user-select:none; background:linear-gradient(180deg,#312e81 0%,#6d28d9 52%,#a21caf 100%);
  }
  #app { position:relative; height:100%; width:100%; display:flex; flex-direction:column; overflow:hidden; }

  /* animated backdrop + fx layers */
  #bg { position:absolute; inset:0; z-index:0; pointer-events:none; display:block; }
  #fx { position:absolute; inset:0; z-index:60; pointer-events:none; display:block; }
  .flash { position:absolute; inset:0; z-index:9; pointer-events:none; opacity:0; }
  .flash.on { animation:flashAnim .5s ease; }
  @keyframes flashAnim { 0%{opacity:0} 18%{opacity:1} 100%{opacity:0} }

  /* HUD */
  .hud { position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 14px; }
  .hud .floor { font-weight:700; opacity:.92; font-size:14px; letter-spacing:.03em; flex:1; }
  .combo {
    display:flex; align-items:center; gap:3px; font-weight:800; font-size:14px; color:#fff;
    background:linear-gradient(180deg,#fb923c,#ef4444); padding:4px 11px; border-radius:999px;
    border:2px solid rgba(255,255,255,.35); box-shadow:0 4px 12px rgba(239,68,68,.5);
    opacity:0; transform:scale(.7); transition:opacity .25s, transform .25s; white-space:nowrap;
  }
  .combo.show { opacity:1; transform:scale(1); }
  .combo.pop { animation:comboPop .5s cubic-bezier(.3,1.6,.5,1); }
  @keyframes comboPop { 0%{transform:scale(1)} 35%{transform:scale(1.45) rotate(-5deg)} 100%{transform:scale(1)} }
  .power-chip {
    display:flex; align-items:center; gap:7px; background:rgba(0,0,0,.28); flex:1; justify-content:flex-end;
    border:2px solid rgba(255,255,255,.28); border-radius:999px; padding:5px 15px; font-size:15px; font-weight:600;
  }
  .power-chip b { font-size:25px; color:#fde68a; min-width:22px; text-align:center; display:inline-block; }
  .power-chip.bump b { animation:numPop .55s cubic-bezier(.3,1.5,.5,1); }
  @keyframes numPop { 0%{transform:scale(1)} 32%{transform:scale(1.55); color:#fff; text-shadow:0 0 16px #fff} 100%{transform:scale(1)} }

  /* 3D tower */
  .scene { flex:1; position:relative; perspective:1100px; overflow:hidden; min-height:0; }
  .tower {
    position:absolute; left:50%; bottom:26px; transform:translateX(-50%) rotateX(28deg);
    transform-style:preserve-3d;
  }
  .towerInner {
    display:flex; flex-direction:column-reverse; align-items:center; gap:12px;
    transform-style:preserve-3d; will-change:transform;
  }
  .floor3d {
    width:230px; height:50px; border-radius:14px; position:relative;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; color:#fff;
    border:2px solid rgba(255,255,255,.3);
    background:linear-gradient(180deg,#a78bfa,#7c3aed); box-shadow:0 13px 0 #4c1d95, 0 26px 26px rgba(0,0,0,.4);
  }
  .floor3d::before { content:""; position:absolute; left:8px; right:8px; top:4px; height:36%; border-radius:10px; background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0)); pointer-events:none; }
  .floor3d.current { background:linear-gradient(180deg,#fcd34d,#f59e0b); box-shadow:0 13px 0 #b45309, 0 26px 26px rgba(0,0,0,.4); color:#3b2a00; }
  .floor3d.enemy { background:linear-gradient(180deg,#fb7185,#e11d48); box-shadow:0 13px 0 #9f1239, 0 26px 26px rgba(0,0,0,.4); }
  .floor3d.ineq { background:linear-gradient(180deg,#67e8f9,#0891b2); box-shadow:0 13px 0 #155e75, 0 26px 26px rgba(0,0,0,.4); }
  .floor3d.boss { width:268px; height:64px; background:linear-gradient(180deg,#f43f5e,#b91c1c); box-shadow:0 16px 0 #7f1d1d, 0 28px 30px rgba(0,0,0,.5); font-size:26px; }
  .floor3d.current.enemy, .floor3d.current.boss, .floor3d.current.ineq { box-shadow:0 13px 0 rgba(0,0,0,.35), 0 0 0 3px rgba(255,255,255,.55), 0 26px 26px rgba(0,0,0,.4); }
  .floor3d.justLanded { animation:landPop .5s cubic-bezier(.3,1.4,.5,1); }
  @keyframes landPop { 0%{transform:scale(1.06,.9) translateY(-3px); filter:brightness(1.5)} 100%{transform:scale(1,1) translateY(0); filter:brightness(1)} }
  .floor3d .tag { position:absolute; top:-28px; right:-8px; background:#fff; color:var(--ink); font-size:12.5px; font-weight:700; padding:2px 8px; border-radius:999px; box-shadow:0 3px 8px rgba(0,0,0,.3); }
  .face { display:inline-block; line-height:1; transform-origin:50% 60%; }
  .face.defeat { animation:faceDefeat .55s ease forwards; }
  @keyframes faceDefeat { 0%{transform:scale(1) rotate(0); opacity:1} 35%{transform:scale(1.35) rotate(10deg)} 100%{transform:scale(0) rotate(160deg); opacity:0} }
  .face.lunge { animation:faceLunge .4s ease; }
  @keyframes faceLunge { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(8px) scale(1.25); filter:drop-shadow(0 0 8px #fff)} }

  .hero { position:absolute; left:50%; bottom:46px; transform:translateX(-50%) translateZ(40px); z-index:3; pointer-events:none; }
  .heroBody { display:inline-block; font-size:40px; filter:drop-shadow(0 8px 5px rgba(0,0,0,.45)); transform-origin:50% 100%; animation:heroIdle 2.4s ease-in-out infinite; }
  @keyframes heroIdle { 0%,100%{transform:translateY(0) scale(1,1)} 50%{transform:translateY(-5px) scale(1.015,.985)} }
  .heroBody.hop { animation:heroHop .52s cubic-bezier(.3,.85,.4,1); }
  @keyframes heroHop {
    0%{transform:translateY(0) scale(1,1)}
    16%{transform:translateY(3px) scale(1.2,.8)}
    46%{transform:translateY(-50px) scale(.84,1.2)}
    78%{transform:translateY(0) scale(1.16,.86)}
    100%{transform:translateY(0) scale(1,1)}
  }
  .heroBody.cheer { animation:heroCheer .6s ease; }
  @keyframes heroCheer { 0%{transform:translateY(0) rotate(0)} 28%{transform:translateY(-20px) rotate(-13deg) scale(1.18)} 60%{transform:translateY(-7px) rotate(12deg) scale(1.1)} 100%{transform:translateY(0) rotate(0)} }

  /* problem panel */
  .panel { position:relative; z-index:6; background:#fff; color:var(--ink); border-radius:26px 26px 0 0; padding:15px 18px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -10px 40px rgba(0,0,0,.4); }
  .concept { text-align:center; font-size:12px; font-weight:700; letter-spacing:.06em; color:var(--violet); text-transform:uppercase; margin-bottom:4px; opacity:.85; }
  .prompt { text-align:center; font-size:15px; line-height:1.35; }
  .prompt b { color:var(--violet); }
  .expr { text-align:center; font-size:38px; font-weight:700; margin:8px 0 14px; letter-spacing:.02em; }
  .expr .q { color:var(--violet); }
  .expr b { color:var(--violet); }
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choices button {
    font-family:inherit; font-size:24px; font-weight:700; padding:15px; border-radius:16px; border:none; touch-action:manipulation;
    background:#f1ecfe; color:var(--ink); cursor:pointer; box-shadow:0 4px 0 #cabdf2; transition:transform .07s, box-shadow .07s, background .15s;
  }
  .choices button:active { transform:translateY(3px); box-shadow:0 1px 0 #cabdf2; }
  .choices button.right { background:var(--green); color:#fff; box-shadow:0 4px 0 var(--green-d); animation:rightPulse .4s ease; }
  @keyframes rightPulse { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .choices button.wrong { background:var(--red); color:#fff; box-shadow:0 4px 0 #991b1b; animation:shake .32s; }
  .choices button.reveal { outline:3px dashed var(--green); outline-offset:2px; animation:revealGlow 1s ease infinite; }
  @keyframes revealGlow { 0%,100%{outline-color:var(--green)} 50%{outline-color:#86efac} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .feedback { text-align:center; min-height:20px; margin-top:11px; font-weight:600; font-size:14px; line-height:1.3; }
  .feedback.good { color:var(--green); } .feedback.bad { color:var(--red); }

  /* floating score text */
  .floatTxt { position:absolute; z-index:61; pointer-events:none; font-weight:800; font-size:22px; transform:translate(-50%,-50%); text-shadow:0 2px 6px rgba(0,0,0,.45); animation:floatUp 1.1s ease forwards; white-space:nowrap; }
  @keyframes floatUp { 0%{opacity:0; transform:translate(-50%,-50%) scale(.6)} 16%{opacity:1; transform:translate(-50%,-62%) scale(1.12)} 100%{opacity:0; transform:translate(-50%,-170%) scale(1)} }

  /* overlay */
  .overlay { position:absolute; inset:0; z-index:10; display:none; align-items:center; justify-content:center; background:rgba(20,12,50,.72); padding:20px; }
  .overlay.show { display:flex; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .card { background:#fff; color:var(--ink); border-radius:26px; padding:26px 28px; text-align:center; max-width:330px; max-height:92%; overflow:auto; animation:cardIn .45s cubic-bezier(.3,1.5,.5,1); }
  @keyframes cardIn { 0%{transform:scale(.7); opacity:0} 100%{transform:scale(1); opacity:1} }
  .card .trophy { font-size:56px; line-height:1; animation:trophyBounce 1.4s ease-in-out infinite; }
  @keyframes trophyBounce { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-10px) rotate(4deg)} }
  .card h2 { font-size:25px; margin-top:6px; color:var(--violet); }
  .card p { color:var(--muted); margin-top:6px; font-size:14px; }
  .card p b { color:var(--ink); }
  .card #bonusWrap b { color:var(--amber); }
  .card .big { font-size:60px; color:var(--violet); font-weight:700; line-height:1; margin:6px 0; }
  .card button { margin-top:16px; font-family:inherit; font-size:18px; font-weight:700; padding:12px 26px; border:none; border-radius:14px; background:var(--violet); color:#fff; cursor:pointer; box-shadow:0 4px 0 var(--violet-d); }
  .card button:active { transform:translateY(3px); box-shadow:0 1px 0 var(--violet-d); }
</style>
</head>
<body>
<div id="app">
  <canvas id="bg"></canvas>
  <div class="hud">
    <div class="floor" id="floorLabel">Floor 1</div>
    <div class="combo" id="combo">🔥<span id="comboCount">x2</span></div>
    <div class="power-chip">⚡ power <b id="powerVal">x</b></div>
  </div>
  <div class="scene">
    <div class="tower" id="tower">
      <div class="towerInner" id="towerInner"></div>
      <div class="hero" id="hero"><span class="heroBody" id="heroBody">🦸</span></div>
    </div>
  </div>
  <div class="panel" id="panel"></div>
  <div class="flash" id="flash"></div>
  <canvas id="fx"></canvas>
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="trophy">🏆</div>
      <h2>Tower Conquered!</h2>
      <p>Tower power <b id="basePower">0</b><span id="bonusWrap"> + <b id="bonusPower">0</b> combo 🔥</span></p>
      <div class="big" id="winPower">0</div>
      <p>banked into your total score ⚡</p>
      <button id="againBtn">Climb again</button>
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";
  var NUM = 9; // floors including the boss at the top
  var S = null;

  function rint(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
  function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
  function postParent(msg) { try { parent.postMessage(msg, "*"); } catch (e) {} }
  function el(tag, cls) { var d = document.createElement(tag); if (cls) d.className = cls; return d; }

  var app = document.getElementById("app");
  var tower = document.getElementById("tower");
  var towerInner = document.getElementById("towerInner");
  var hero = document.getElementById("hero");
  var heroBody = document.getElementById("heroBody");
  var panel = document.getElementById("panel");
  var overlay = document.getElementById("overlay");
  var powerVal = document.getElementById("powerVal");
  var chip = document.querySelector(".power-chip");
  var floorLabel = document.getElementById("floorLabel");
  var combo = document.getElementById("combo");
  var comboCount = document.getElementById("comboCount");
  var flashEl = document.getElementById("flash");
  var bg = document.getElementById("bg");
  var fx = document.getElementById("fx");
  var bgCtx = bg.getContext("2d");
  var fxCtx = fx.getContext("2d");

  /* ---------- canvas sizing ---------- */
  var appW = 0, appH = 0, dpr = 1;
  function fitCanvas() {
    var r = app.getBoundingClientRect();
    appW = Math.max(1, r.width); appH = Math.max(1, r.height);
    dpr = Math.min(2, window.devicePixelRatio || 1);
    [bg, fx].forEach(function (c) {
      c.width = Math.round(appW * dpr); c.height = Math.round(appH * dpr);
      c.style.width = appW + "px"; c.style.height = appH + "px";
      c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
    });
    initBg();
  }

  /* ---------- parallax backdrop ---------- */
  var motes = [], spires = [], scrollV = 0;
  var PAL = ["124,58,237", "236,72,153", "6,182,212", "245,158,11", "34,197,94", "253,230,138"];
  function initBg() {
    motes = [];
    var n = Math.max(22, Math.min(52, Math.round((appW * appH) / 15000)));
    for (var i = 0; i < n; i++) {
      var depth = 0.3 + Math.random() * 0.9;
      motes.push({
        x: Math.random() * appW, y: Math.random() * appH,
        r: 5 + depth * 22, depth: depth, v: 6 + depth * 16,
        a: 0.07 + Math.random() * 0.16, ph: Math.random() * 6.28,
        rgb: PAL[(Math.random() * PAL.length) | 0]
      });
    }
    spires = [];
    var sc = 4;
    for (var k = 0; k < sc; k++) {
      spires.push({ x: (k + 0.5) / sc + (Math.random() - 0.5) * 0.12, w: 0.1 + Math.random() * 0.1, h: 0.28 + Math.random() * 0.4, a: 0.04 + Math.random() * 0.04, ph: Math.random() * 6.28 });
    }
  }
  function rr(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  function drawBg(dt, now) {
    var c = bgCtx; c.clearRect(0, 0, appW, appH);
    scrollV *= Math.pow(0.04, dt);
    var i, s;
    for (i = 0; i < spires.length; i++) {
      s = spires[i];
      var sx = s.x * appW + Math.sin(now / 1500 + s.ph) * 4;
      var sw = s.w * appW, sh = s.h * appH;
      c.fillStyle = "rgba(255,255,255," + s.a + ")";
      rr(c, sx - sw / 2, appH - sh, sw, sh, sw * 0.32); c.fill();
    }
    for (i = 0; i < motes.length; i++) {
      var m = motes[i];
      m.y += (m.v + scrollV * m.depth) * dt;
      if (m.y - m.r > appH) { m.y = -m.r; m.x = Math.random() * appW; }
      var a = m.a * (0.6 + 0.4 * Math.sin(now / 700 + m.ph));
      var g = c.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r);
      g.addColorStop(0, "rgba(" + m.rgb + "," + a + ")");
      g.addColorStop(1, "rgba(" + m.rgb + ",0)");
      c.fillStyle = g;
      c.beginPath(); c.arc(m.x, m.y, m.r, 0, 6.2832); c.fill();
    }
  }
  function bgKick() { scrollV = 280; }

  /* ---------- confetti / fx ---------- */
  var fxParts = [];
  function spawnConfetti(x, y, count, opts) {
    opts = opts || {};
    var colors = opts.colors || ["#7c3aed", "#ec4899", "#06b6d4", "#22c55e", "#f59e0b", "#ef4444", "#fde68a"];
    for (var i = 0; i < count; i++) {
      var base = (opts.ang != null ? opts.ang : -Math.PI / 2);
      var ang = base + (Math.random() - 0.5) * (opts.spread != null ? opts.spread : 1.3);
      var spd = (opts.speed != null ? opts.speed : 235) * (0.55 + Math.random() * 0.7);
      fxParts.push({
        x: x, y: y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        g: opts.g != null ? opts.g : 540, size: (opts.size || 7) * (0.6 + Math.random() * 0.9),
        color: colors[(Math.random() * colors.length) | 0], rot: Math.random() * 6.28,
        vr: (Math.random() - 0.5) * 13, life: opts.life || 1.25, age: 0,
        shape: Math.random() < 0.5 ? "rect" : "circ"
      });
    }
  }
  function drawFx(dt) {
    var c = fxCtx; c.clearRect(0, 0, appW, appH);
    for (var i = fxParts.length - 1; i >= 0; i--) {
      var p = fxParts[i];
      p.age += dt;
      if (p.age >= p.life || p.y > appH + 30) { fxParts.splice(i, 1); continue; }
      p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
      var t = p.age / p.life;
      c.globalAlpha = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
      c.fillStyle = p.color;
      c.save(); c.translate(p.x, p.y); c.rotate(p.rot);
      if (p.shape === "rect") c.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.5);
      else { c.beginPath(); c.arc(0, 0, p.size / 1.7, 0, 6.2832); c.fill(); }
      c.restore();
    }
    c.globalAlpha = 1;
  }

  /* ---------- master loop ---------- */
  var lastNow = 0;
  function frame(now) {
    if (!lastNow) lastNow = now;
    var dt = Math.min(50, now - lastNow) / 1000; lastNow = now;
    drawBg(dt, now); drawFx(dt);
    requestAnimationFrame(frame);
  }

  /* ---------- little helpers (flash / float text / anim number) ---------- */
  function flash(grad) {
    flashEl.style.background = grad || "radial-gradient(circle, rgba(255,255,255,.55), rgba(255,255,255,0) 70%)";
    flashEl.classList.remove("on"); void flashEl.offsetWidth; flashEl.classList.add("on");
  }
  function floatText(txt, x, y, color) {
    var d = el("div", "floatTxt"); d.textContent = txt;
    d.style.left = x + "px"; d.style.top = y + "px"; if (color) d.style.color = color;
    app.appendChild(d); setTimeout(function () { if (d.parentNode) d.parentNode.removeChild(d); }, 1150);
  }
  function centerOf(node) {
    var r = node.getBoundingClientRect(), a = app.getBoundingClientRect();
    return { x: r.left - a.left + r.width / 2, y: r.top - a.top + r.height / 2 };
  }
  function animateNumber(node, from, to, dur) {
    from = Number(from) || 0; to = Number(to) || 0;
    if (from === to) { node.textContent = to; return; }
    var start = performance.now();
    (function step(now) {
      var t = Math.min(1, (now - start) / dur), e = 1 - Math.pow(1 - t, 3);
      node.textContent = Math.round(from + (to - from) * e);
      if (t < 1) requestAnimationFrame(step); else node.textContent = to;
    })(performance.now());
  }
  function reflowClass(node, cls, ms) {
    node.classList.remove(cls); void node.offsetWidth; node.classList.add(cls);
    if (ms) setTimeout(function () { node.classList.remove(cls); }, ms);
  }
  function hopHero() { reflowClass(heroBody, "hop", 540); }
  function cheerHero() { reflowClass(heroBody, "cheer", 620); }

  /* ---------- power display ---------- */
  function setPower(to, animate) {
    var from = (S.shownPower == null) ? 0 : S.shownPower;
    if (to == null) { S.shownPower = null; powerVal.textContent = "x"; return; }
    S.shownPower = to;
    if (!animate) { powerVal.textContent = to; return; }
    reflowClass(chip, "bump", 560);
    animateNumber(powerVal, from, to, 600);
  }

  /* ---------- floor model ---------- */
  function buildFloors() {
    var f = [{ kind: "assign" }];
    var placedIneq = false, placedEnemy = false;
    for (var i = 1; i < NUM - 1; i++) {
      if (!placedIneq && i >= 2 && i <= NUM - 3 && Math.random() < 0.5) { f.push({ kind: "ineq" }); placedIneq = true; continue; }
      if (i >= 2 && Math.random() < 0.34) { f.push({ kind: "enemy" }); placedEnemy = true; continue; }
      if (i >= 4 && Math.random() < 0.45) f.push({ kind: "op", op: "two", a: rint(2, 3), b: rint(3, 12) });
      else if (Math.random() < 0.5) f.push({ kind: "op", op: "mul", a: rint(2, 3) });
      else f.push({ kind: "op", op: "add", b: rint(6, 18) });
    }
    if (!placedEnemy) f[NUM - 2] = { kind: "enemy" }; // guarantee at least one monster
    f.push({ kind: "boss" });
    return f;
  }

  function floorTag(fl) {
    if (fl.kind === "assign") return "x = ?";
    if (fl.kind === "enemy") return "monster";
    if (fl.kind === "ineq") return "logic gate";
    if (fl.kind === "boss") return "BOSS";
    if (fl.op === "mul") return "× " + fl.a;
    if (fl.op === "add") return "+ " + fl.b;
    return "×" + fl.a + " +" + fl.b;
  }
  function floorFace(fl) {
    if (fl.kind === "assign") return "🚪";
    if (fl.kind === "enemy") return "👾";
    if (fl.kind === "ineq") return "⚖️";
    if (fl.kind === "boss") return "🐉";
    if (fl.op === "mul") return "× " + fl.a;
    if (fl.op === "add") return "+ " + fl.b;
    return "×" + fl.a + "+" + fl.b;
  }

  function distract(ans) {
    var set = [ans];
    var deltas = [-2, -1, 1, 2, 3, -3, Math.round(ans * 0.5) || 1, -(Math.round(ans * 0.3) || 1), ans + 1];
    var guard = 0;
    while (set.length < 4 && guard++ < 40) {
      var d = ans + pick(deltas);
      if (d >= 0 && set.indexOf(d) === -1) set.push(d);
    }
    while (set.length < 4) set.push(ans + set.length);
    return set.sort(function () { return Math.random() - 0.5; });
  }

  // Build the problem for the current floor, using the hero's CURRENT power so
  // the player is always solving for their own next score.
  function genProblem() {
    var fl = S.floors[S.floor];
    var P = S.power;
    if (fl.kind === "assign") {
      var a = rint(4, 7), b = a + rint(2, 4);
      return { kind: "assign", choices: Math.random() < 0.5 ? [a, b] : [b, a] };
    }
    if (fl.kind === "op") {
      var res, expr, desc;
      if (fl.op === "mul") { res = P * fl.a; expr = P + " × " + fl.a; desc = "multiplies your power by " + fl.a; return { kind: "op", op: "mul", a: fl.a, expr: expr, answer: res, choices: distract(res), desc: desc }; }
      if (fl.op === "add") { res = P + fl.b; expr = P + " + " + fl.b; desc = "adds " + fl.b + " to your power"; return { kind: "op", op: "add", b: fl.b, expr: expr, answer: res, choices: distract(res), desc: desc }; }
      res = P * fl.a + fl.b; expr = P + " × " + fl.a + " + " + fl.b; desc = "multiplies by " + fl.a + ", then adds " + fl.b;
      return { kind: "op", op: "two", a: fl.a, b: fl.b, partial: P * fl.a, expr: expr, answer: res, choices: distract(res), desc: desc };
    }
    if (fl.kind === "ineq") {
      var ops = [{ k: "ge", s: "≥" }, { k: "le", s: "≤" }, { k: "gt", s: ">" }, { k: "lt", s: "<" }];
      var o = pick(ops);
      var n = P + pick([-3, -2, -1, 0, 1, 2]); if (n < 0) n = 0;
      var truth = o.k === "ge" ? P >= n : o.k === "le" ? P <= n : o.k === "gt" ? P > n : P < n;
      return { kind: "ineq", op: o.k, sym: o.s, n: n, answer: truth, choices: [true, false] };
    }
    if (fl.kind === "enemy") {
      var E = Math.min(P - 1, Math.max(2, rint(3, Math.max(3, Math.floor(P * 0.55)))));
      var r = P - E;
      return { kind: "enemy", E: E, expr: P + " − " + E, answer: r, choices: distract(r) };
    }
    // boss
    var B = Math.min(P - 1, Math.max(3, rint(Math.max(2, Math.floor(P * 0.35)), Math.max(3, Math.floor(P * 0.7)))));
    var rb = P - B;
    return { kind: "boss", B: B, expr: P + " − " + B, answer: rb, choices: distract(rb) };
  }

  /* ---------- render ---------- */
  function renderHUD() {
    var top = S.floor >= NUM - 1;
    floorLabel.textContent = top ? "Top Floor · BOSS" : "Floor " + (S.floor + 1) + " / " + NUM;
    renderCombo();
  }
  function renderCombo() {
    if (S.streak >= 2) { combo.classList.add("show"); comboCount.textContent = "x" + S.streak; }
    else combo.classList.remove("show");
  }
  function comboPop() { reflowClass(combo, "pop", 520); }

  function positionHero() {
    var cur = towerInner.querySelector(".floor3d.current");
    if (cur) hero.style.bottom = (cur.offsetHeight - 6) + "px";
  }

  function renderTower() {
    towerInner.innerHTML = "";
    var end = Math.min(NUM - 1, S.floor + 5); // +1 extra for the climb-slide buffer
    for (var i = S.floor; i <= end; i++) {
      var fl = S.floors[i];
      var d = el("div", "floor3d" + (i === S.floor ? " current" : "") +
        (fl.kind === "enemy" ? " enemy" : "") + (fl.kind === "ineq" ? " ineq" : "") + (fl.kind === "boss" ? " boss" : ""));
      var face = el("span", "face"); face.textContent = floorFace(fl); d.appendChild(face);
      var tag = el("div", "tag"); tag.textContent = "F" + (i + 1) + " · " + floorTag(fl); d.appendChild(tag);
      towerInner.appendChild(d);
    }
    positionHero();
  }

  function choiceButtons(list, answer, render) {
    var wrap = el("div", "choices"); if (list.length === 2) wrap.style.gridTemplateColumns = "1fr 1fr";
    list.forEach(function (c) {
      var b = document.createElement("button");
      b.innerHTML = render ? render(c) : c;
      b._val = c; b._correct = (answer != null && c === answer);
      b.onclick = function () { onAnswer(c, b); };
      wrap.appendChild(b);
    });
    return wrap;
  }

  function renderPanel() {
    panel.innerHTML = "";
    var p = S.problem;
    var concept = el("div", "concept"), prompt = el("div", "prompt");

    if (p.kind === "assign") {
      concept.textContent = "Variables · pick your start";
      prompt.innerHTML = "Your hero IS the variable <b>x</b> — a placeholder for a number. Choose what <b>x</b> equals to set your starting power:";
      panel.appendChild(concept); panel.appendChild(prompt);
      panel.appendChild(choiceButtons(p.choices, null, function (c) { return "x = " + c; }));
    } else if (p.kind === "ineq") {
      concept.textContent = "Inequalities · true or false?";
      prompt.innerHTML = "🚪 A logic gate blocks the stairs. Your power is <b>" + S.power + "</b>. Is this statement <b>TRUE</b> or <b>FALSE</b>?";
      var ie = el("div", "expr"); ie.innerHTML = "<b>" + S.power + "</b> " + p.sym + " " + p.n;
      panel.appendChild(concept); panel.appendChild(prompt); panel.appendChild(ie);
      panel.appendChild(choiceButtons([true, false], p.answer, function (c) { return c ? "TRUE ✓" : "FALSE ✗"; }));
    } else {
      if (p.kind === "op") {
        concept.textContent = p.op === "two" ? "Expressions · order of operations" : "Expressions · build your power";
        prompt.innerHTML = "Your power is <b>" + S.power + "</b>. This gate " + p.desc + ". What's your <b>new power</b>?";
      } else if (p.kind === "enemy") {
        concept.textContent = "Equations · take the hit";
        prompt.innerHTML = "👾 A monster strikes for <b>" + p.E + "</b> damage! Solve for the power you have left:";
      } else {
        concept.textContent = "The Boss · final blow";
        prompt.innerHTML = "🐉 The Boss hits for <b>" + p.B + "</b>! What power survives to claim the top?";
      }
      var expr = el("div", "expr"); expr.innerHTML = p.expr + " = <span class=\"q\">?</span>";
      panel.appendChild(concept); panel.appendChild(prompt); panel.appendChild(expr);
      panel.appendChild(choiceButtons(p.choices, p.answer, null));
    }
    var fb = el("div", "feedback"); fb.id = "feedback"; panel.appendChild(fb);
  }

  function setFeedback(txt, good) {
    var fb = document.getElementById("feedback");
    if (fb) { fb.textContent = txt; fb.className = "feedback " + (good ? "good" : "bad"); }
  }

  function repeated(v, n) { var a = []; for (var i = 0; i < n; i++) a.push(v); return a.join(" + "); }
  function hintFor(p) {
    var P = S.power, t = S.tries; // t = number of wrong tries so far (1, then 2)
    if (p.kind === "op") {
      if (p.op === "mul") return t < 2 ? ("× means repeated adding — that's " + p.a + " groups of " + P + ".") : ("Add it up:  " + repeated(P, p.a) + " = ?");
      if (p.op === "add") return t < 2 ? ("Start at " + P + " and count up " + p.b + ".") : (P + " + " + p.b + " — add it onto your power.");
      return t < 2 ? ("Order of operations: do × before +.") : ("First " + P + " × " + p.a + " = " + p.partial + ", then + " + p.b + ".");
    }
    if (p.kind === "enemy") return t < 2 ? ("Subtract the damage: start at " + P + ", take away " + p.E + ".") : (P + " − " + p.E + " = ?  Count back " + p.E + " from " + P + ".");
    if (p.kind === "boss") return t < 2 ? ("Subtract the boss's hit from your power.") : (P + " − " + p.B + " = ?  Count back " + p.B + ".");
    if (p.kind === "ineq") return t < 2 ? ("Compare the two numbers — which side is larger?") : ("Check carefully: is " + P + " really " + p.sym + " " + p.n + "?");
    return "Not quite — try again!";
  }

  function defeatEnemy() {
    var face = towerInner.querySelector(".floor3d.current .face");
    if (face) face.classList.add("defeat");
    var cur = towerInner.querySelector(".floor3d.current");
    if (cur) { var c = centerOf(cur); spawnConfetti(c.x, c.y, 30, { spread: 1.9, speed: 290, life: 1.1 }); }
  }
  function lungeEnemy() {
    var face = towerInner.querySelector(".floor3d.current .face");
    if (face) reflowClass(face, "lunge", 420);
  }

  /* ---------- answer handling ---------- */
  function onAnswer(val, btn) {
    if (S.locked || S.climbing) return;
    var p = S.problem, oldP = S.power;

    if (p.kind === "assign") {
      S.locked = true; btn.classList.add("right");
      S.power = val; setPower(val, true);
      setFeedback("x = " + val + " — power set! Let's climb! 🚀", true);
      cheerHero();
      var ca = centerOf(btn); spawnConfetti(ca.x, ca.y, 22, {});
      renderHUD();
      setTimeout(advance, 680);
      return;
    }

    if (val === p.answer) {
      S.locked = true; btn.classList.add("right");
      var firstTry = (S.tries === 0), gained = 0;
      if (firstTry) { S.streak++; if (S.streak >= 2) { gained = S.streak; S.comboBonus += gained; } }

      var hasNum = (p.kind !== "ineq");
      if (hasNum) { S.power = p.answer; setPower(p.answer, true); }

      var bc = centerOf(btn);
      spawnConfetti(bc.x, bc.y, gained > 0 ? 42 : 24, {});
      flash(gained > 0 ? "radial-gradient(circle, rgba(245,158,11,.5), rgba(245,158,11,0) 70%)" : null);
      cheerHero();
      if (p.kind === "enemy" || p.kind === "boss") defeatEnemy();

      if (hasNum) {
        var d = p.answer - oldP, pc = centerOf(chip);
        floatText((d >= 0 ? "+" : "") + d, pc.x, pc.y + 6, d >= 0 ? "#22c55e" : "#ef4444");
      }

      var msg;
      if (p.kind === "ineq") msg = "✓ " + S.power + " " + p.sym + " " + p.n + " is " + (p.answer ? "TRUE" : "FALSE") + " — gate opens!";
      else { msg = "✓ " + p.expr + " = " + p.answer; if (p.kind === "enemy") msg += " — monster down!"; if (p.kind === "boss") msg += " — victory!"; }

      if (gained > 0) {
        msg = "🔥 COMBO x" + S.streak + "!  +" + gained + " bonus banked";
        floatText("🔥 +" + gained, appW / 2, appH * 0.33, "#f59e0b");
        comboPop();
        flash("radial-gradient(circle, rgba(236,72,153,.5), rgba(236,72,153,0) 70%)");
        spawnConfetti(appW / 2, appH * 0.34, 30, { spread: 1.7, speed: 310 });
      }
      setFeedback(msg, true);
      renderHUD();
      setTimeout(function () { if (p.kind === "boss") win(); else advance(); }, p.kind === "boss" ? 720 : 760);
    } else {
      btn.classList.add("wrong"); btn.disabled = true;
      if (S.streak >= 2) floatText("combo lost", appW / 2, appH * 0.36, "#94a3b8");
      if (S.streak > 0) { S.streak = 0; renderCombo(); }
      S.tries++;
      setFeedback(hintFor(p), false);
      if (p.kind === "enemy" || p.kind === "boss") lungeEnemy();
      if (S.tries >= 2) {
        var bs = panel.querySelectorAll(".choices button");
        bs.forEach(function (b) { if (b._correct) b.classList.add("reveal"); });
      }
    }
  }

  /* ---------- transitions ---------- */
  function advance() {
    S.climbing = true;
    hopHero(); bgKick();
    var cur = towerInner.querySelector(".floor3d.current");
    var step = (cur ? cur.offsetHeight : 50) + 12;
    towerInner.style.transition = "transform .5s cubic-bezier(.34,1.2,.5,1)";
    towerInner.style.transform = "translateY(" + step + "px)";
    setTimeout(function () {
      S.floor++; S.tries = 0; S.locked = false; S.problem = genProblem();
      towerInner.style.transition = "none"; towerInner.style.transform = "";
      renderHUD(); renderTower(); renderPanel();
      var nc = towerInner.querySelector(".floor3d.current");
      if (nc) reflowClass(nc, "justLanded", 520);
      S.climbing = false;
    }, 500);
  }

  function celebrate(ms) {
    var endT = performance.now() + ms;
    (function shoot() {
      spawnConfetti(Math.random() * appW, -12, 12, { ang: Math.PI / 2, spread: 0.5, speed: 90 + Math.random() * 140, g: 420, life: 2.4 });
      if (performance.now() < endT) setTimeout(shoot, 110);
    })();
  }

  function win() {
    var total = S.power + S.comboBonus;
    document.getElementById("basePower").textContent = S.power;
    var bw = document.getElementById("bonusWrap");
    if (S.comboBonus > 0) { bw.style.display = ""; document.getElementById("bonusPower").textContent = S.comboBonus; }
    else bw.style.display = "none";
    document.getElementById("winPower").textContent = "0";
    overlay.classList.add("show");
    hero.style.opacity = 0;
    animateNumber(document.getElementById("winPower"), 0, total, 1100);
    celebrate(1700);
    postParent({ type: "atb:victory", power: total });
  }

  function init() {
    S = { power: null, shownPower: null, floor: 0, floors: buildFloors(), tries: 0, locked: false, climbing: false, problem: null, streak: 0, comboBonus: 0 };
    S.problem = genProblem();
    overlay.classList.remove("show");
    hero.style.opacity = 1;
    fxParts.length = 0;
    setPower(null, false);
    renderHUD(); renderTower(); renderPanel();
    postParent({ type: "atb:reset" });
  }

  document.getElementById("againBtn").onclick = init;

  fitCanvas();
  if (window.ResizeObserver) { var ro = new ResizeObserver(function () { fitCanvas(); positionHero(); }); ro.observe(app); }
  else window.addEventListener("resize", function () { fitCanvas(); positionHero(); });
  requestAnimationFrame(frame);
  init();
})();
</script>
</body>
</html>
